---
- name: Install jq (required to patch CompassVPN dashboard)
  ansible.builtin.apt:
    name: jq
    state: present
    update_cache: true

# apt.grafana.com is geoblocked from RU (403). Download .deb on control
# machine (no geo restrictions) and copy to remote for local install.
- name: Get latest Grafana release version (GitHub API)
  ansible.builtin.uri:
    url: "https://api.github.com/repos/grafana/grafana/releases/latest"
    method: GET
    return_content: true
    headers:
      Accept: "application/vnd.github.v3+json"
    status_code: 200
  register: grafana_release_info
  delegate_to: localhost
  run_once: true
  retries: 3
  delay: 3
  until: grafana_release_info.status == 200

- name: Set Grafana version fact
  ansible.builtin.set_fact:
    grafana_resolved_version: "{{ grafana_release_info.json.tag_name | regex_replace('^v', '') }}"

# Grafana ships a .sha256 sidecar but the filename inside is the build-prefixed
# `dist/grafana_<ver>_<build>_linux_amd64.deb`, which doesn't match Ansible's
# URL-based checksum lookup (looks up by source filename). Fetch and extract.
- name: Fetch Grafana .deb sha256 sidecar
  ansible.builtin.uri:
    url: "https://dl.grafana.com/oss/release/grafana_{{ grafana_resolved_version }}_amd64.deb.sha256"
    return_content: true
    status_code: 200
  register: grafana_sha256_resp
  delegate_to: localhost
  run_once: true
  retries: 3
  delay: 3
  until: grafana_sha256_resp.status == 200

- name: Set Grafana .deb sha256 fact
  ansible.builtin.set_fact:
    grafana_deb_sha256: "{{ grafana_sha256_resp.content.split()[0] }}"

- name: Download Grafana .deb on control machine
  ansible.builtin.get_url:
    url: "https://dl.grafana.com/oss/release/grafana_{{ grafana_resolved_version }}_amd64.deb"
    dest: "/tmp/grafana_{{ grafana_resolved_version }}_amd64.deb"
    mode: "0644"
    checksum: "sha256:{{ grafana_deb_sha256 }}"
  delegate_to: localhost
  run_once: true

- name: Copy Grafana .deb to remote
  ansible.builtin.copy:
    src: "/tmp/grafana_{{ grafana_resolved_version }}_amd64.deb"
    dest: "/tmp/grafana_{{ grafana_resolved_version }}_amd64.deb"
    mode: "0644"

- name: Install Grafana from .deb
  ansible.builtin.apt:
    deb: "/tmp/grafana_{{ grafana_resolved_version }}_amd64.deb"
    state: present
  notify: Restart grafana

- name: Remove Grafana .deb temp file
  ansible.builtin.file:
    path: "/tmp/grafana_{{ grafana_resolved_version }}_amd64.deb"
    state: absent

- name: Ensure Grafana provisioning directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"
  loop:
    - "{{ grafana_provisioning_dir }}/datasources"
    - "{{ grafana_provisioning_dir }}/dashboards"
    - "{{ grafana_provisioning_dir }}/alerting"
    - "{{ grafana_data_dir }}/dashboards"

- name: Deploy grafana.ini
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: "0640"
  notify: Restart grafana

- name: Deploy Grafana datasource (VictoriaMetrics)
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/victoriametrics.yml"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana

- name: Deploy Grafana dashboard provisioner config
  ansible.builtin.template:
    src: grafana-dashboards.yml.j2
    dest: "{{ grafana_provisioning_dir }}/dashboards/xray.yml"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana

- name: Download compassvpn Grafana dashboard JSON
  ansible.builtin.get_url:
    url: "https://grafana.com/api/dashboards/{{ grafana_dashboard_id }}/revisions/latest/download"
    dest: "{{ grafana_data_dir }}/dashboards/xray-compassvpn.json"
    owner: grafana
    group: grafana
    mode: "0640"
  retries: 3
  delay: 3

# CompassVPN dashboard contains panels that don't work in our setup:
# - "Proxy Configuration Links" — queries vpn_config{...} from CompassVPN's
#   management daemon (we don't run it).
# - "Top Requested Domains/IPs" — queries xray_requested_domain_ip_total which
#   we drop at vmagent (closes destination-IP leak, M-fix 2026-05-05).
# Strip both so they don't render as empty. Runs after every download to
# survive upstream dashboard refreshes.
- name: Strip non-functional panels from CompassVPN dashboard
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      src="{{ grafana_data_dir }}/dashboards/xray-compassvpn.json"
      tmp=$(mktemp)
      jq 'walk(if type=="object" and (.panels?|type)=="array" then .panels |= map(select(.title!="Proxy Configuration Links" and .title!="Top Requested Domains/IPs")) else . end)' "$src" > "$tmp"
      if ! cmp -s "$src" "$tmp"; then
        install -o grafana -g grafana -m 0640 "$tmp" "$src"
        rm -f "$tmp"
        echo CHANGED
      else
        rm -f "$tmp"
      fi
    executable: /bin/bash
  register: jq_patch_compassvpn
  changed_when: "'CHANGED' in jq_patch_compassvpn.stdout"
  notify: Restart grafana

- name: Replace DS_* datasource placeholders with provisioned UID (file provisioning has no variable)
  ansible.builtin.replace:
    path: "{{ grafana_data_dir }}/dashboards/xray-compassvpn.json"
    regexp: "{{ grafana_dashboard_datasource_placeholder | regex_escape }}"
    replace: "{{ grafana_prometheus_datasource_uid }}"
  notify: Restart grafana

- name: Deploy Grafana Xray per-user traffic dashboard
  ansible.builtin.template:
    src: dashboards/xray-users-traffic.json.j2
    dest: "{{ grafana_data_dir }}/dashboards/xray-users-traffic.json"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana
  tags: grafana_dashboards

- name: Deploy Grafana server status dashboard
  ansible.builtin.template:
    src: dashboards/server-status.json.j2
    dest: "{{ grafana_data_dir }}/dashboards/server-status.json"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana
  tags: grafana_dashboards

- name: Deploy Grafana DPI detection dashboard
  ansible.builtin.template:
    src: dashboards/dpi-detection.json.j2
    dest: "{{ grafana_data_dir }}/dashboards/dpi-detection.json"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana
  tags: grafana_dashboards

# One-shot cleanup of the legacy filename + uid so a seized RU disk + Grafana
# UI both stop carrying the gov-specific term. Safe to remove this task once
# every host has been redeployed and the file is gone (verify: ls
# {{ grafana_data_dir }}/dashboards/ | grep tspu  must be empty).
- name: Remove legacy tspu-detection.json (renamed to dpi-detection.json)
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}/dashboards/tspu-detection.json"
    state: absent
  notify: Restart grafana
  tags: grafana_dashboards

- name: Deploy Grafana inbound status dashboard
  ansible.builtin.template:
    src: dashboards/inbound-status.json.j2
    dest: "{{ grafana_data_dir }}/dashboards/inbound-status.json"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana
  tags: grafana_dashboards

- name: Deploy Grafana monitoring stack health dashboard
  ansible.builtin.template:
    src: dashboards/monitoring-health.json.j2
    dest: "{{ grafana_data_dir }}/dashboards/monitoring-health.json"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana
  tags: grafana_dashboards

- name: Deploy Grafana raven-dashboard internals dashboard
  ansible.builtin.template:
    src: dashboards/raven-dashboard-internals.json.j2
    dest: "{{ grafana_data_dir }}/dashboards/raven-dashboard-internals.json"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana
  tags: grafana_dashboards

# RU Traffic Split dashboard removed 2026-05-05 — its sole signal source
# was the xray-bridge-stats scrape job which was decommissioned with the
# transparent-bridge teardown (C5 Phase 3, 2026-04-30). All panels were
# perpetually empty. Cleanup task purges the on-disk file from previous
# deploys; remove this task in a future PR once every host has been
# redeployed (verify: ls /var/lib/grafana/dashboards/ | grep ru-traffic
# is empty).
- name: Remove decommissioned RU Traffic Split dashboard (post-bridge teardown)
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}/dashboards/ru-traffic-split.json"
    state: absent
  notify: Restart grafana
  tags: grafana_dashboards

- name: Deploy Grafana alerting rules
  ansible.builtin.template:
    src: grafana-alerting.yml.j2
    dest: "{{ grafana_provisioning_dir }}/alerting/raven-alerts.yml"
    owner: grafana
    group: grafana
    mode: "0640"
  notify: Restart grafana
  tags: grafana_dashboards

- name: Enable and start Grafana
  ansible.builtin.systemd:
    name: "{{ grafana_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
