---
# --- Swapfile (MON droplet has no swap; VM+Grafana on 1GB thrash without it) ---
- name: Check for existing swapfile
  ansible.builtin.stat:
    path: "{{ victoriametrics_swap_file }}"
  register: vm_swapfile
  when: victoriametrics_swap_enabled | bool

- name: Allocate swapfile
  ansible.builtin.command:
    cmd: "fallocate -l {{ victoriametrics_swap_size_mb }}M {{ victoriametrics_swap_file }}"
    creates: "{{ victoriametrics_swap_file }}"
  when:
    - victoriametrics_swap_enabled | bool
    - not vm_swapfile.stat.exists

- name: Secure swapfile permissions
  ansible.builtin.file:
    path: "{{ victoriametrics_swap_file }}"
    owner: root
    group: root
    mode: "0600"
  when: victoriametrics_swap_enabled | bool

- name: Format swapfile
  ansible.builtin.command:
    cmd: "mkswap {{ victoriametrics_swap_file }}"
  when:
    - victoriametrics_swap_enabled | bool
    - not vm_swapfile.stat.exists
  register: vm_mkswap
  changed_when: vm_mkswap.rc == 0

- name: Enable swapfile and persist in fstab
  ansible.posix.mount:
    name: none
    src: "{{ victoriametrics_swap_file }}"
    fstype: swap
    opts: sw
    state: present
  when: victoriametrics_swap_enabled | bool

- name: Activate swap now
  ansible.builtin.command:
    cmd: "swapon {{ victoriametrics_swap_file }}"
  when:
    - victoriametrics_swap_enabled | bool
    - not vm_swapfile.stat.exists
  register: vm_swapon
  changed_when: vm_swapon.rc == 0
  failed_when:
    - vm_swapon.rc != 0
    - "'already' not in (vm_swapon.stderr | default(''))"

- name: Set vm.swappiness (swap as safety-net, not hot path)
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ victoriametrics_swappiness | string }}"
    state: present
    sysctl_set: true
    reload: true
  when: victoriametrics_swap_enabled | bool

- name: Create victoriametrics system group
  ansible.builtin.group:
    name: "{{ victoriametrics_group }}"
    state: present
    system: true

- name: Create victoriametrics system user
  ansible.builtin.user:
    name: "{{ victoriametrics_user }}"
    group: "{{ victoriametrics_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure VictoriaMetrics data directory exists
  ansible.builtin.file:
    path: "{{ victoriametrics_data_dir }}"
    state: directory
    owner: "{{ victoriametrics_user }}"
    group: "{{ victoriametrics_group }}"
    mode: "0750"

- name: Ensure VictoriaMetrics config directory exists
  ansible.builtin.file:
    path: /etc/victoriametrics
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Detect architecture for VictoriaMetrics
  ansible.builtin.set_fact:
    vm_arch: >-
      {{
        'amd64' if ansible_architecture in ['x86_64', 'amd64']
        else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
        else ansible_architecture
      }}

- name: Get VictoriaMetrics releases list
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ victoriametrics_github_repo }}/releases?per_page=10"
    method: GET
    return_content: true
    headers:
      Accept: "application/vnd.github.v3+json"
    status_code: 200
  register: vm_release_list
  retries: 3
  delay: 3
  until: vm_release_list.status == 200
  when: victoriametrics_version | string == "latest"

- name: Set VictoriaMetrics version fact (pinned)
  ansible.builtin.set_fact:
    vm_resolved_version: "{{ victoriametrics_version }}"
  when: victoriametrics_version | string != "latest"

- name: Set VictoriaMetrics version fact (from GitHub releases)
  ansible.builtin.set_fact:
    vm_resolved_version: >-
      {%- set releases = vm_release_list.json | default(vm_release_list.content | from_json, true) -%}
      {%- set asset_pattern = 'victoria-metrics-linux-' + vm_arch + '-' -%}
      {%- set ns = namespace(version='') -%}
      {%- for release in releases -%}
        {%- if ns.version == '' -%}
          {%- for asset in release.assets -%}
            {%- if asset.name.startswith(asset_pattern) and asset.name.endswith('.tar.gz') and 'enterprise' not in asset.name and 'cluster' not in asset.name -%}
              {%- set ns.version = release.tag_name -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.version }}
  when:
    - victoriametrics_version | string == "latest"
    - not (vm_release_list.skipped | default(false))

# Idempotency guard: skip the download/extract/install chain (and its restart
# handler) when the binary already matches the resolved version. Without this,
# every deploy re-downloads to a clean /tmp → vm_download.changed → restart.
# check_mode: false so the gate also resolves correctly under --check.
- name: Check installed VictoriaMetrics version
  ansible.builtin.command: "{{ victoriametrics_bin_dir }}/victoria-metrics --version"
  register: vm_installed
  changed_when: false
  failed_when: false
  check_mode: false

- name: Determine whether VictoriaMetrics (re)install is needed
  ansible.builtin.set_fact:
    vm_install_needed: "{{ vm_resolved_version not in (vm_installed.stdout | default('')) }}"

- name: Download VictoriaMetrics binary
  ansible.builtin.get_url:
    url: "https://github.com/{{ victoriametrics_github_repo }}/releases/download/{{ vm_resolved_version }}/victoria-metrics-linux-{{ vm_arch }}-{{ vm_resolved_version }}.tar.gz"
    dest: "/tmp/victoria-metrics-{{ vm_resolved_version }}.tar.gz"
    mode: "0644"
    checksum: "sha256:https://github.com/{{ victoriametrics_github_repo }}/releases/download/{{ vm_resolved_version }}/victoria-metrics-linux-{{ vm_arch }}-{{ vm_resolved_version }}_checksums.txt"
  register: vm_download
  when: vm_install_needed

- name: Extract VictoriaMetrics binary
  ansible.builtin.unarchive:
    src: "/tmp/victoria-metrics-{{ vm_resolved_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
  when: vm_install_needed

- name: Install VictoriaMetrics binary
  ansible.builtin.copy:
    src: /tmp/victoria-metrics-prod
    dest: "{{ victoriametrics_bin_dir }}/victoria-metrics"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: vm_install_needed
  notify: Restart victoriametrics

- name: Remove VictoriaMetrics temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/victoria-metrics-{{ vm_resolved_version }}.tar.gz"
    - "/tmp/victoria-metrics-prod"
  when: vm_install_needed

# Post-Variant-B: VictoriaMetrics no longer scrapes anything itself.
# All scraping is done by vmagent on EU (which has WG to RU for node_exporter)
# and pushed to VM via remote-write. Old scrape config left to clean up.
- name: Remove obsolete VictoriaMetrics scrape config (post-Variant-B)
  ansible.builtin.file:
    path: "{{ victoriametrics_scrape_config }}"
    state: absent
  notify: Restart victoriametrics

- name: Deploy VictoriaMetrics systemd unit
  ansible.builtin.template:
    src: victoriametrics.service.j2
    dest: "/etc/systemd/system/victoriametrics.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart victoriametrics

- name: Enable and start VictoriaMetrics
  ansible.builtin.systemd:
    name: "{{ victoriametrics_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Allow VictoriaMetrics remote write from EU via DO private network
  community.general.ufw:
    rule: allow
    src: "{{ monitoring_private_subnet }}"
    port: "{{ victoriametrics_listen.split(':')[1] }}"
    proto: tcp
    comment: "VictoriaMetrics remote write from EU vmagent (DO VPC)"
