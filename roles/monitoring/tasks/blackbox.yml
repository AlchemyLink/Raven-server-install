---
- name: Get latest blackbox_exporter release version
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ blackbox_github_repo }}/releases/latest"
    method: GET
    return_content: true
    headers:
      Accept: "application/vnd.github.v3+json"
    status_code: 200
  register: blackbox_release_info
  retries: 3
  delay: 3
  until: blackbox_release_info.status == 200
  when: blackbox_version == "latest"

- name: Set blackbox_exporter version fact
  ansible.builtin.set_fact:
    blackbox_resolved_version: >-
      {{
        blackbox_release_info.json.tag_name
        if blackbox_version == "latest"
        else blackbox_version
      }}

- name: Detect architecture for blackbox_exporter
  ansible.builtin.set_fact:
    blackbox_arch: >-
      {{
        'amd64' if ansible_architecture in ['x86_64', 'amd64']
        else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
        else ansible_architecture
      }}

- name: Download blackbox_exporter archive
  ansible.builtin.get_url:
    url: "https://github.com/{{ blackbox_github_repo }}/releases/download/{{ blackbox_resolved_version }}/blackbox_exporter-{{ blackbox_resolved_version[1:] }}.linux-{{ blackbox_arch }}.tar.gz"
    dest: "/tmp/blackbox_exporter-{{ blackbox_resolved_version }}.tar.gz"
    mode: "0644"
  register: blackbox_download

- name: Extract blackbox_exporter archive
  ansible.builtin.unarchive:
    src: "/tmp/blackbox_exporter-{{ blackbox_resolved_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
  when: blackbox_download.changed

- name: Install blackbox_exporter binary
  ansible.builtin.copy:
    src: "/tmp/blackbox_exporter-{{ blackbox_resolved_version[1:] }}.linux-{{ blackbox_arch }}/blackbox_exporter"
    dest: "{{ blackbox_bin_dir }}/blackbox_exporter"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: blackbox_download.changed
  notify: Restart blackbox-exporter

- name: Remove blackbox_exporter temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/blackbox_exporter-{{ blackbox_resolved_version }}.tar.gz"
    - "/tmp/blackbox_exporter-{{ blackbox_resolved_version[1:] }}.linux-{{ blackbox_arch }}"

- name: Create blackbox system group
  ansible.builtin.group:
    name: "{{ blackbox_group }}"
    system: true

- name: Create blackbox system user
  ansible.builtin.user:
    name: "{{ blackbox_user }}"
    group: "{{ blackbox_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Create blackbox config directory
  ansible.builtin.file:
    path: "{{ blackbox_config_dir }}"
    state: directory
    owner: root
    group: "{{ blackbox_group }}"
    mode: "0750"

- name: Deploy blackbox config
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: "{{ blackbox_config_dir }}/blackbox.yml"
    owner: root
    group: "{{ blackbox_group }}"
    mode: "0640"
  notify: Restart blackbox-exporter

- name: Deploy blackbox-exporter systemd unit
  ansible.builtin.template:
    src: blackbox.service.j2
    dest: "/etc/systemd/system/blackbox-exporter.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart blackbox-exporter

- name: Enable and start blackbox-exporter
  ansible.builtin.systemd:
    name: "{{ blackbox_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
