---
- name: Restart xray-exporter
  ansible.builtin.systemd:
    name: "{{ xray_exporter_service_name }}"
    state: restarted
    daemon_reload: true
  when: ansible_facts['service_mgr'] == "systemd"

- name: Restart node_exporter
  ansible.builtin.systemd:
    name: "{{ node_exporter_service_name }}"
    state: restarted
    daemon_reload: true
  when: ansible_facts['service_mgr'] == "systemd"

- name: Restart xray-stats-exporter
  ansible.builtin.systemd:
    name: "{{ xray_stats_exporter_service_name }}"
    state: restarted
    daemon_reload: true
  when: ansible_facts['service_mgr'] == "systemd"

- name: Restart victoriametrics
  ansible.builtin.systemd:
    name: "{{ victoriametrics_service_name }}"
    state: restarted
    daemon_reload: true
  when: ansible_facts['service_mgr'] == "systemd"

- name: Restart grafana
  ansible.builtin.systemd:
    name: "{{ grafana_service_name }}"
    state: restarted
    daemon_reload: true
  when: ansible_facts['service_mgr'] == "systemd"

- name: Restart blackbox-exporter
  ansible.builtin.systemd:
    name: "{{ blackbox_service_name }}"
    state: restarted
    daemon_reload: true
  when: ansible_facts['service_mgr'] == "systemd"

- name: Restart vmagent
  ansible.builtin.systemd:
    name: "{{ vmagent_service_name }}"
    state: restarted
    daemon_reload: true
  when: ansible_facts['service_mgr'] == "systemd"

- name: Restart nginx-prometheus-exporter
  ansible.builtin.systemd:
    name: nginx-prometheus-exporter
    state: restarted
    daemon_reload: true
  when: ansible_facts['service_mgr'] == "systemd"

- name: Reload nginx
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  when: ansible_facts['service_mgr'] == "systemd"

- name: Restart raven-probe
  ansible.builtin.systemd:
    name: "{{ raven_probe_service_name }}"
    state: restarted
    daemon_reload: true
  when: ansible_facts['service_mgr'] == "systemd"
