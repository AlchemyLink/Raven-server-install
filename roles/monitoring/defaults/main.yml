---

# xray-exporter
xray_exporter_version: "latest"               # "latest" or pinned e.g. "v0.2.0"
xray_exporter_github_repo: "compassvpn/xray-exporter"
xray_exporter_listen: "127.0.0.1:9550"
xray_exporter_metrics_path: "/scrape"
xray_exporter_xray_endpoint: "127.0.0.1:10085"
xray_exporter_log_path: "/var/log/Xray/access.log"
xray_exporter_log_time_window: 5             # minutes, sliding window for user activity metrics
xray_exporter_bin_dir: "/usr/local/bin"
xray_exporter_data_dir: "/var/lib/xray-exporter"   # GeoLite2 *.mmdb download cwd (xrayuser must be writable)
xray_exporter_service_name: "xray-exporter"
xray_exporter_user: "xrayuser"               # same user as Xray — needs read access to access.log
xray_exporter_group: "xrayuser"

# VictoriaMetrics
victoriametrics_version: "latest"            # "latest" or pinned e.g. "v1.101.0"
victoriametrics_github_repo: "VictoriaMetrics/VictoriaMetrics"
victoriametrics_listen: "{{ hostvars[groups['mon'][0]].private_ip }}:8428"  # MON private IP (DO VPC eth1) — EU vmagent push + Grafana datasource
# VictoriaMetrics retention. Format follows VM's -retentionPeriod flag:
# Nd (days), NM (months), Ny (years). Reduced from 1M to 14d as part of A2
# seizure-risk reduction — bounds the historical traffic-pattern dataset that
# would be available to anyone who gains physical access to the RU TSDB.
victoriametrics_retention: "14d"
victoriametrics_data_dir: "/var/lib/victoriametrics"
victoriametrics_bin_dir: "/usr/local/bin"
victoriametrics_service_name: "victoriametrics"
victoriametrics_scrape_interval: "15s"
victoriametrics_scrape_timeout: "5s"
victoriametrics_scrape_config: "/etc/victoriametrics/scrape.yml"
# VM auto-derives concurrent-select capacity from CPU count; on the 1-vCPU
# monitoring droplet that caps at 2, so multi-panel Grafana dashboards serialise
# behind 2 query slots and panels lag/timeout on load. Queries here are tiny
# (~10-30ms) and CPU is idle, so raising the cap is safe and removes the stall.
victoriametrics_max_concurrent_requests: 8
# VM defaults to 60% of detected RAM for caches. On a 1GB box co-located with
# Grafana (~330MB RSS) that over-subscribes RAM (swap was 0) → page-cache thrash
# and memory-pressure stalls. Cap at 40% so VM and Grafana coexist with headroom.
victoriametrics_memory_allowed_percent: 40
# The MON droplet (1 vCPU / 1GB) ships with no swap. Co-locating VM + Grafana
# leaves only ~120MB free, and heavy dashboard loads trigger hard memory-pressure
# stalls (no reclaim headroom). A small swapfile gives the kernel room to reclaim
# instead of freezing the box. swappiness kept low so it's safety-net, not hot path.
victoriametrics_swap_enabled: true
victoriametrics_swap_file: /swapfile
victoriametrics_swap_size_mb: 2048
victoriametrics_swappiness: 10
# External label attached to every scraped sample. CompassVPN dashboard 23181
# filters all queries by donor=~"$donor"; without this label, ~80% of panels
# are empty because label_values(donor) returns nothing.
monitoring_donor_label: "alchemylink"
victoriametrics_user: "victoriametrics"
victoriametrics_group: "victoriametrics"

# vmagent (EU VPS — scrapes EU exporters, pushes to MON VictoriaMetrics via DO private network)
vmagent_version: "latest"
vmagent_listen: "127.0.0.1:8429"
vmagent_remote_write_url: "http://{{ hostvars[groups['mon'][0]].private_ip }}:8428/api/v1/write"
vmagent_data_dir: "/var/lib/vmagent"
vmagent_scrape_config: "/etc/victoriametrics/vmagent-scrape.yml"
vmagent_bin_dir: "/usr/local/bin"
vmagent_service_name: "vmagent"
vmagent_user: "vmagent"
vmagent_group: "vmagent"

# WireGuard network (legacy — RU↔EU mesh)
wg_network: "10.10.0.0/24"

# DO VPC private network (EU↔MON) — used for ufw rules on MON allowing
# vmagent push from EU. Set to your provider's private subnet.
monitoring_private_subnet: "10.114.0.0/20"

# Server public IPs — derived from inventory; used in Grafana dashboards and alerts.
# Override in group_vars/host_vars if inventory structure differs.
monitoring_eu_host: "{{ hostvars['vm_my_srv']['ansible_host'] }}"
monitoring_ru_host: "{{ hostvars['vm_my_ru']['ansible_host'] }}"

# node_exporter (system metrics: CPU, RAM, disk, network)
node_exporter_version: "latest"
node_exporter_listen: "127.0.0.1:9100"         # EU: localhost only
node_exporter_ru_listen: "10.10.0.2:9100"      # RU: WireGuard interface only
node_exporter_ru_scrape: "10.10.0.2:9100"      # EU scrapes RU via WireGuard
node_exporter_bin_dir: "/usr/local/bin"
node_exporter_service_name: "node_exporter"

# nginx-prometheus-exporter (RU only — reads nginx stub_status, exports request
# count, accepts, connections by state; scraped by EU vmagent over WireGuard).
# Listen on per-host WG IP so multi-RU works. Falls back to global wg_ru_ip
# (10.10.0.2) for hosts without an explicit wg_ip — matches scrape.yml.j2 logic.
# Pinned (was "latest") — the GitHub releases/latest API call rate-limited/flaked on RU
# deploys ("dict object has no attribute 'json'") and aborted the play before the service
# (re)started. Pinning removes that fetch entirely; the binary is downloaded on the control
# machine (good GitHub access) and shipped to RU. Bump manually when upgrading.
nginx_exporter_version: "v1.5.1"
nginx_exporter_listen: "{{ hostvars[inventory_hostname].wg_ip | default(wg_ru_ip) }}:9113"
nginx_exporter_bin_dir: "/usr/local/bin"
nginx_stub_status_port: 8081                   # localhost-only nginx server block

# xray-stats-exporter (per-user traffic via StatsService gRPC)
# Public GitHub repo — release workflow builds linux-amd64 / linux-arm64 /
# darwin-amd64 / darwin-arm64. The role auto-resolves the binary URL and
# downloads it; pin via xray_stats_exporter_version, or override the whole
# fetch with -e xray_stats_exporter_local_binary=/path for a hand-built drop.
xray_stats_exporter_github_repo: "AlchemyLink/xray-stats-exporter"
xray_stats_exporter_version: "latest"
xray_stats_exporter_listen: "127.0.0.1:9551"
xray_stats_exporter_metrics_path: "/metrics"
xray_stats_exporter_xray_endpoint: "127.0.0.1:10085"
xray_stats_exporter_bin_dir: "/usr/local/bin"
xray_stats_exporter_service_name: "xray-stats-exporter"
xray_stats_exporter_user: "xrayuser"    # needs read access to Xray gRPC API and access.log
xray_stats_exporter_group: "xrayuser"
xray_stats_exporter_log_path: "/var/log/Xray/access.log"
xray_stats_exporter_error_log_path: "/var/log/Xray/error.log"
xray_stats_exporter_geo_city_db: "/var/lib/xray-exporter/GeoLite2-City.mmdb"
xray_stats_exporter_geo_asn_db: "/var/lib/xray-exporter/GeoLite2-ASN.mmdb"
# Pseudonymise email labels before they leave the exporter; same secret must be
# set on raven-dashboard (raven_dashboard_xray_stats_anonymize_secret) so its
# PromQL queries can target the hashed series. Defined in secrets.yml; empty
# disables anonymisation (raw emails — pre-A2 behaviour).
xray_stats_anonymize_secret: ""

# NOTE: xray-exporter-bridge / xray-stats-exporter-bridge vars were removed 2026-06-09 —
# the RU xray-bridge was decommissioned (C5 Phase 3); their tasks/templates/handlers/scrape
# jobs are gone. RU is now a pure SNI relay (node_exporter only).

# raven-subscribe health probe (VictoriaMetrics scrapes /health → up metric)
raven_subscribe_scrape_addr: "127.0.0.1:8080"

# raven-subscribe app metrics (/metrics on the dedicated loopback listener:
# raven_fallback_enabled, raven_fallback_denied_total). Must match
# raven_subscribe_metrics_listen in the raven_subscribe role. Empty = skip the
# scrape job (set this when the deployed binary predates v0.3.4).
raven_subscribe_metrics_addr: "127.0.0.1:9091"

# Grafana
grafana_listen: "{{ hostvars[inventory_hostname].private_ip | default('127.0.0.1') }}:13000"
grafana_service_name: "grafana-server"
grafana_data_dir: "/var/lib/grafana"
grafana_log_dir: "/var/log/grafana"
grafana_provisioning_dir: "/etc/grafana/provisioning"
grafana_dashboard_id: 23181                  # compassvpn dashboard on grafana.com (file: xray-compassvpn.json)
# Extra: xray-users-traffic.json — upload/download per user (xray-exporter + policy statsUser*)
# Dashboard 23181 embeds ${DS_GRAFANACLOUD-COMPASSVPN-PROM}; file provisioning often has no such variable — replaced in JSON after download
grafana_dashboard_datasource_placeholder: "${DS_GRAFANACLOUD-COMPASSVPN-PROM}"
grafana_prometheus_datasource_name: "grafanacloud-compassvpn-prom"
grafana_prometheus_datasource_uid: "grafanacloud-compassvpn-prom"
# grafana_admin_password: set in secrets.yml (ansible-vault)
# victoriametrics_auth_username: set in secrets.yml (ansible-vault)
# victoriametrics_auth_password: set in secrets.yml (ansible-vault)

# Blackbox exporter — active TCP+TLS probes for each Xray inbound
blackbox_version: "latest"
blackbox_github_repo: "prometheus/blackbox_exporter"
blackbox_listen: "127.0.0.1:9115"
blackbox_bin_dir: "/usr/local/bin"
blackbox_config_dir: "/etc/blackbox"
blackbox_service_name: "blackbox-exporter"
blackbox_user: "blackbox"
blackbox_group: "blackbox"

# Inbound probes — TCP+TLS handshake to each SNI via nginx :443
# probe_success == 0 → inbound or nginx is down → critical alert
blackbox_inbound_probes:
  # EU VPS inbounds (via EU nginx :443, SNI-routed to Xray). SNIs MUST match the live
  # nginx_frontend stream map (cross-check roles/nginx_frontend/defaults/main.yml):
  #   dl.google.com → vless-reality-v2-in, www.python.org → vless-xhttp-v2-in,
  #   www.adobe.com → vless-fallback-in. V2-only since architecture simplification;
  #   v1 (askubuntu/old-adobe) and the decommissioned RU xray-bridge probe were removed.
  - name: "vless-reality-v2"
    target: "{{ hostvars['vm_my_srv']['ansible_host'] }}:443"
    sni: "dl.google.com"
    server: "eu"
  - name: "vless-xhttp-v2"
    target: "{{ hostvars['vm_my_srv']['ansible_host'] }}:443"
    sni: "www.python.org"
    server: "eu"
  # NOTE: vless-fallback-in (XHTTP+Reality, cover www.adobe.com) is intentionally NOT
  # blackbox-probed. Its Reality handshake does not complete via blackbox's Go tcp_tls
  # prober (instant RST), even though the path is healthy — verified 2026-06-09 with
  # `openssl s_client -connect EU:443 -servername www.adobe.com` → Verify code 0. A
  # permanent false-red is worse than no probe; fallback health is covered by raven-probe
  # `eu_adobe` (same cover-SNI) + the xray_inbound_*_bytes_total{inbound="vless-fallback-in"}
  # traffic series. (reality-v2/xhttp-v2 on google/python covers DO complete the Go handshake.)
  # NOTE: hysteria2 reserve (:47014) is UDP/QUIC — the blackbox tcp prober cannot probe it.
  # Its reachability is covered by raven-probe from RU; no blackbox entry here by design.

# raven-probe — layered Reality-aware connectivity probe (DNS/TCP/TLS/HTTP).
# Deployed on RU peers; vmagent scrapes via WG mesh.
raven_probe_repo_path: "{{ playbook_dir }}/../../raven-probe"   # local source repo (sibling of Raven-server-install; playbook_dir is roles/)
raven_probe_bin_dir: "/usr/local/bin"
raven_probe_config_dir: "/etc/raven-probe"
raven_probe_user: "raven-probe"
raven_probe_service_name: "raven-probe"
raven_probe_listen: "{{ hostvars[inventory_hostname].wg_ip | default(wg_ru_ip) }}:9117"
raven_probe_interval: "5m"
raven_probe_timeout: "5s"
raven_probe_vantage: "{{ inventory_hostname | regex_replace('^vm_my_', '') }}"  # ru / ru2 / ...
raven_probe_eu_host: "{{ hostvars['vm_my_srv'].ansible_host }}"
raven_probe_targets:
  # Mode 2 — cover-SNI to OUR EU; detects path-specific DPI (PIN DC vs Beget pattern).
  # SNIs track the live inbound covers: python=XHTTP-v2 (migrated from mozilla 2026-06-07),
  # google=Reality-v2, adobe=fallback.
  - {name: eu_python,        sni: www.python.org,     host_override: "{{ raven_probe_eu_host }}"}   # = XHTTP-v2 cover-SNI
  - {name: eu_google,        sni: dl.google.com,      host_override: "{{ raven_probe_eu_host }}"}
  - {name: eu_adobe,         sni: www.adobe.com,      host_override: "{{ raven_probe_eu_host }}"}   # = fallback cover-SNI
  # Mode 1 — same SNI, no override (real CDN); detects ISP-wide SNI blocks
  - {name: isp_python,        sni: www.python.org}
  - {name: isp_google,        sni: dl.google.com}
  - {name: isp_adobe,         sni: www.adobe.com}
  # Controls — should always work; if break, internet is just down
  - {name: ctl_yandex,     sni: ya.ru}
  - {name: ctl_cloudflare, sni: www.cloudflare.com}
