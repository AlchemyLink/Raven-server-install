---

# xray-exporter
xray_exporter_version: "latest"               # "latest" or pinned e.g. "v0.2.0"
xray_exporter_github_repo: "compassvpn/xray-exporter"
xray_exporter_listen: "127.0.0.1:9550"
xray_exporter_metrics_path: "/scrape"
xray_exporter_xray_endpoint: "127.0.0.1:10085"
xray_exporter_log_path: "/var/log/Xray/access.log"
xray_exporter_log_time_window: 5             # minutes, sliding window for user activity metrics
xray_exporter_bin_dir: "/usr/local/bin"
xray_exporter_data_dir: "/var/lib/xray-exporter"   # GeoLite2 *.mmdb download cwd (xrayuser must be writable)
xray_exporter_service_name: "xray-exporter"
xray_exporter_user: "xrayuser"               # same user as Xray — needs read access to access.log
xray_exporter_group: "xrayuser"

# VictoriaMetrics
victoriametrics_version: "latest"            # "latest" or pinned e.g. "v1.101.0"
victoriametrics_github_repo: "VictoriaMetrics/VictoriaMetrics"
victoriametrics_listen: "10.10.0.2:8428"     # WireGuard interface — vmagent push from EU + Grafana access
# VictoriaMetrics retention. Format follows VM's -retentionPeriod flag:
# Nd (days), NM (months), Ny (years). Reduced from 1M to 14d as part of A2
# seizure-risk reduction — bounds the historical traffic-pattern dataset that
# would be available to anyone who gains physical access to the RU TSDB.
victoriametrics_retention: "14d"
victoriametrics_data_dir: "/var/lib/victoriametrics"
victoriametrics_bin_dir: "/usr/local/bin"
victoriametrics_service_name: "victoriametrics"
victoriametrics_scrape_interval: "15s"
victoriametrics_scrape_timeout: "5s"
victoriametrics_scrape_config: "/etc/victoriametrics/scrape.yml"
# External label attached to every scraped sample. CompassVPN dashboard 23181
# filters all queries by donor=~"$donor"; without this label, ~80% of panels
# are empty because label_values(donor) returns nothing.
monitoring_donor_label: "alchemylink"
victoriametrics_user: "victoriametrics"
victoriametrics_group: "victoriametrics"

# vmagent (EU VPS — scrapes EU exporters, pushes to RU VictoriaMetrics via WireGuard)
vmagent_version: "latest"
vmagent_listen: "127.0.0.1:8429"
vmagent_remote_write_url: "http://10.10.0.2:8428/api/v1/write"
vmagent_data_dir: "/var/lib/vmagent"
vmagent_scrape_config: "/etc/victoriametrics/vmagent-scrape.yml"
vmagent_bin_dir: "/usr/local/bin"
vmagent_service_name: "vmagent"
vmagent_user: "vmagent"
vmagent_group: "vmagent"

# WireGuard network (for ufw rules on RU)
wg_network: "10.10.0.0/24"

# Server public IPs — derived from inventory; used in Grafana dashboards and alerts.
# Override in group_vars/host_vars if inventory structure differs.
monitoring_eu_host: "{{ hostvars['vm_my_srv']['ansible_host'] }}"
monitoring_ru_host: "{{ hostvars['vm_my_ru2']['ansible_host'] }}"

# node_exporter (system metrics: CPU, RAM, disk, network)
node_exporter_version: "latest"
node_exporter_listen: "127.0.0.1:9100"         # EU: localhost only
node_exporter_ru_listen: "10.10.0.2:9100"      # RU: WireGuard interface only
node_exporter_ru_scrape: "10.10.0.2:9100"      # EU scrapes RU via WireGuard
node_exporter_bin_dir: "/usr/local/bin"
node_exporter_service_name: "node_exporter"

# xray-stats-exporter (per-user traffic via StatsService gRPC)
xray_stats_exporter_listen: "127.0.0.1:9551"
xray_stats_exporter_metrics_path: "/metrics"
xray_stats_exporter_xray_endpoint: "127.0.0.1:10085"
xray_stats_exporter_bin_dir: "/usr/local/bin"
xray_stats_exporter_service_name: "xray-stats-exporter"
xray_stats_exporter_user: "xrayuser"    # needs read access to Xray gRPC API and access.log
xray_stats_exporter_group: "xrayuser"
xray_stats_exporter_log_path: "/var/log/Xray/access.log"
xray_stats_exporter_error_log_path: "/var/log/Xray/error.log"
xray_stats_exporter_geo_city_db: "/var/lib/xray-exporter/GeoLite2-City.mmdb"
xray_stats_exporter_geo_asn_db: "/var/lib/xray-exporter/GeoLite2-ASN.mmdb"
# Pseudonymise email labels before they leave the exporter; same secret must be
# set on raven-dashboard (raven_dashboard_xray_stats_anonymize_secret) so its
# PromQL queries can target the hashed series. Defined in secrets.yml; empty
# disables anonymisation (raw emails — pre-A2 behaviour).
xray_stats_anonymize_secret: ""

# xray-exporter-bridge (compassvpn/xray-exporter for RU xray-bridge, runs on vm_my_ru)
# Listens on WireGuard interface — EU VictoriaMetrics scrapes via 10.10.0.2:9553.
# Shares the same binary as EU xray-exporter (same GitHub repo / version).
xray_bridge_exporter_listen: "10.10.0.2:9553"
xray_bridge_exporter_metrics_path: "/scrape"
xray_bridge_exporter_xray_endpoint: "10.10.0.2:10086"
xray_bridge_exporter_log_path: "/var/log/xray-bridge/access.log"
xray_bridge_exporter_log_time_window: 5
xray_bridge_exporter_bin_dir: "/usr/local/bin"
xray_bridge_exporter_data_dir: "/var/lib/xray-exporter-bridge"
xray_bridge_exporter_service_name: "xray-exporter-bridge"
xray_bridge_exporter_user: "xraybridgeuser"
xray_bridge_exporter_group: "xraybridgeuser"

# xray-stats-exporter-bridge (per-user traffic for RU xray-bridge, runs on vm_my_ru)
# Listens on WireGuard interface — EU VictoriaMetrics scrapes via 10.10.0.2:9552.
# GeoLite2 DBs are synced from EU /var/lib/xray-exporter/ via control machine.
# error-log-path enables DPI detection metrics (R4A) — TLS handshake failures,
# TCP RST events, active probes recorded as xray_handshake_failure_total etc.
xray_bridge_stats_exporter_listen: "10.10.0.2:9552"
xray_bridge_stats_exporter_metrics_path: "/metrics"
xray_bridge_stats_exporter_xray_endpoint: "10.10.0.2:10086"
xray_bridge_stats_exporter_bin_dir: "/usr/local/bin"
xray_bridge_stats_exporter_service_name: "xray-stats-exporter-bridge"
xray_bridge_stats_exporter_user: "xraybridgeuser"
xray_bridge_stats_exporter_group: "xraybridgeuser"
xray_bridge_stats_exporter_log_path: "/var/log/xray-bridge/access.log"
xray_bridge_stats_exporter_error_log_path: "/var/log/xray-bridge/error.log"
xray_bridge_stats_exporter_data_dir: "/var/lib/xray-stats-exporter-bridge"
xray_bridge_stats_exporter_geo_city_db: "/var/lib/xray-stats-exporter-bridge/GeoLite2-City.mmdb"
xray_bridge_stats_exporter_geo_asn_db: "/var/lib/xray-stats-exporter-bridge/GeoLite2-ASN.mmdb"
# xray_bridge_stats_exporter_local_binary: path to pre-built binary on control machine (optional)

# raven-subscribe health probe (VictoriaMetrics scrapes /health → up metric)
raven_subscribe_scrape_addr: "127.0.0.1:8080"

# Grafana
grafana_listen: "127.0.0.1:13000"
grafana_service_name: "grafana-server"
grafana_data_dir: "/var/lib/grafana"
grafana_log_dir: "/var/log/grafana"
grafana_provisioning_dir: "/etc/grafana/provisioning"
grafana_dashboard_id: 23181                  # compassvpn dashboard on grafana.com (file: xray-compassvpn.json)
# Extra: xray-users-traffic.json — upload/download per user (xray-exporter + policy statsUser*)
# Dashboard 23181 embeds ${DS_GRAFANACLOUD-COMPASSVPN-PROM}; file provisioning often has no such variable — replaced in JSON after download
grafana_dashboard_datasource_placeholder: "${DS_GRAFANACLOUD-COMPASSVPN-PROM}"
grafana_prometheus_datasource_name: "grafanacloud-compassvpn-prom"
grafana_prometheus_datasource_uid: "grafanacloud-compassvpn-prom"
# grafana_admin_password: set in secrets.yml (ansible-vault)
# victoriametrics_auth_username: set in secrets.yml (ansible-vault)
# victoriametrics_auth_password: set in secrets.yml (ansible-vault)

# Blackbox exporter — active TCP+TLS probes for each Xray inbound
blackbox_version: "latest"
blackbox_github_repo: "prometheus/blackbox_exporter"
blackbox_listen: "127.0.0.1:9115"
blackbox_bin_dir: "/usr/local/bin"
blackbox_config_dir: "/etc/blackbox"
blackbox_service_name: "blackbox-exporter"
blackbox_user: "blackbox"
blackbox_group: "blackbox"

# Inbound probes — TCP+TLS handshake to each SNI via nginx :443
# probe_success == 0 → inbound or nginx is down → critical alert
blackbox_inbound_probes:
  # EU VPS inbounds (via EU nginx :443, SNI-routed to Xray)
  - name: "vless-reality"
    target: "{{ hostvars['vm_my_srv']['ansible_host'] }}:443"
    sni: "askubuntu.com"
    server: "eu"
  - name: "vless-xhttp"
    target: "{{ hostvars['vm_my_srv']['ansible_host'] }}:443"
    sni: "www.adobe.com"
    server: "eu"
  - name: "vless-reality-v2"
    target: "{{ hostvars['vm_my_srv']['ansible_host'] }}:443"
    sni: "dl.google.com"
    server: "eu"
  - name: "vless-xhttp-v2"
    target: "{{ hostvars['vm_my_srv']['ansible_host'] }}:443"
    sni: "addons.mozilla.org"
    server: "eu"
  # RU VPS — xray-bridge inbound (via RU nginx :443)
  - name: "xray-bridge"
    target: "{{ hostvars['vm_my_ru2']['ansible_host'] }}:443"
    sni: "www.wikipedia.org"
    server: "ru"
