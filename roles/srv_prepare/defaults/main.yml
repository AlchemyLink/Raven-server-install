# defaults/main.yml
# Default variables for configuration server role

# Apt package for install
srv_prepare_apps_list_apt:
  - iptables
  - htop
  - sudo
  - vim
  - git
  - curl
  - tar
  - gzip
  - openssl
  - dnsutils
  - jq
  - sqlite3

# Yum package for install
srv_prepare_apps_list_rpm:
  - iptables-services
  - htop
  - sudo
  - vim
  - git
  - curl
  - tar
  - gzip
  - openssl

# Apk package for install
srv_prepare_apps_list_alpine:
  - iptables
  - htop
  - sudo
  - vim
  - git
  - curl
  - tar
  - gzip
  - openssl
  - ca-certificates

# Default sysctl settings — TCP performance + conntrack capacity for VPN workload.
# Default Ubuntu values are dangerously low for a multi-thousand-connection VPN
# box: nf_conntrack_max=8192 fills under load, packets get silently dropped,
# and tcp_timeout_established=432000 (5d) holds VPN slots forever even after
# clients disconnect. Cause of "TLS handshake fails from new source IP" symptom.
srv_prepare_bbr_settings:
  # BBR + buffers
  net.ipv4.tcp_congestion_control: bbr        # Enable BBR
  net.core.default_qdisc: fq                  # Set default queue discipline to fq
  net.core.rmem_max: 67108864                 # Maximum receive buffer size
  net.core.wmem_max: 67108864                 # Maximum send buffer size
  net.ipv4.tcp_rmem: 4096 87380 67108864      # Minimum, default, and maximum receive buffer sizes
  net.ipv4.tcp_wmem: 4096 65536 67108864      # Minimum, default, and maximum send buffer sizes
  net.core.netdev_max_backlog: 250000         # Maximum number of packets queued on the input side
  net.core.somaxconn: 65535                   # Maximum connection backlog
  net.ipv4.tcp_tw_reuse: 1                    # Allow reusing TIME-WAIT sockets for new connections
  net.ipv4.tcp_fin_timeout: 15                # Reduce TIME-WAIT duration
  # SYN backlog — protect bursty handshake bursts
  net.ipv4.tcp_max_syn_backlog: 4096
  # Conntrack capacity — VPN workload generates lots of short-lived flows
  net.netfilter.nf_conntrack_max: 131072
  net.netfilter.nf_conntrack_buckets: 131072
  # Reduce VPN slot retention — 5 days default is too generous for short flows
  net.netfilter.nf_conntrack_tcp_timeout_established: 3600
  # PMTU blackhole recovery. The client path (client → RU TSPU → relay → WG tunnel
  # → EU) stacks TLS-in-XHTTP inside WireGuard (MTU 1420); censored networks often
  # drop ICMP "fragmentation needed", so PMTUD silently fails and large/sustained
  # transfers stall while the handshake succeeds. mtu_probing=1 makes the kernel
  # fall back to probing when a blackhole is detected. icmp_echo_ignore_all only
  # blocks echo, not frag-needed, so server-side PMTUD still works — this guards
  # the path the servers can't see.
  net.ipv4.tcp_mtu_probing: 1
  # SYN-flood defense. The relay already took a SYN/empty-connection flood
  # (incident 2026-06-08); with the enlarged SYN backlog above, keep syncookies
  # explicit rather than relying on the distro default.
  net.ipv4.tcp_syncookies: 1
  # Forwarding-host hardening (these boxes run ip_forward + WG mesh). Refuse
  # ICMP redirects and source-routed packets — no legitimate use here, removes
  # an MITM/route-injection vector. NOTE: rp_filter intentionally NOT set —
  # strict reverse-path filtering can drop legit packets under the asymmetric
  # WG-mesh routing; left to the distro default pending a mesh-tested change.
  net.ipv4.conf.all.accept_redirects: 0
  net.ipv4.conf.all.send_redirects: 0
  net.ipv4.conf.all.accept_source_route: 0
