---

raven_subscribe_github_repo: "alchemylink/raven-subscribe"
raven_subscribe_install_dir: "/usr/local/bin"
raven_subscribe_config_dir: "/etc/xray-subscription"
raven_subscribe_db_dir: "/var/lib/xray-subscription"
raven_subscribe_service_name: "xray-subscription"

raven_subscribe_listen_addr: "127.0.0.1:8080"
raven_subscribe_sync_interval_seconds: 60
raven_subscribe_rate_limit_sub_per_min: 60
raven_subscribe_rate_limit_admin_per_min: 30

# DNS servers injected into generated client subscription configs.
# Each entry is a plain IP string or an object with Xray DNS server fields:
#   address       — IP address (required)
#   domains       — use this server only for matching domains (geosite:/domain: syntax)
#   skipFallback  — true: exclude from fallback list; prevents this server handling
#                   non-matching domains (pair with "domains" to scope it properly)
#   expectIPs     — discard responses whose IPs don't match (geoip: syntax); anti-spoofing
# Empty list = use built-in default (1.1.1.1, 8.8.8.8, 8.8.4.4).
#
# Recommended RU setup — Yandex DNS for ALLOWED RU services only.
#
# WARNING: never put `geosite:ru-blocked` (or any Roskomnadzor-blocked domain)
# under a Russian resolver. Yandex DNS is RU-jurisdiction (374-ФЗ "Yarovaya"
# + СОРМ-3) and is required to log/disclose query metadata to FSB. Routing
# blocked-domain queries to Yandex would tie each subscriber's residential
# IP to every blocked site they query — defeating the entire VPN bypass.
#
# Yandex DNS is only used for `category-ru`/`domain:ru` (banks, госуслуги,
# Ozon, VK, etc.) where geo-localized CDN resolution defeats VPN-detection
# (mismatch IP↔SIM↔geo). For these, Yandex sees the same queries any RU
# ISP/telecom resolver would see — no anonymity regression.
#
# Blocked domains (`geosite:ru-blocked`) keep resolving via 1.1.1.1/9.9.9.9
# through the proxy chain — never touch a Russian resolver.
#
#   - address: "77.88.8.8"
#     domains:
#       - "geosite:category-ru"
#       - "domain:ru"
#       - "domain:su"
#       - "domain:рф"
#     skipFallback: true
#     expectIPs: ["geoip:ru"]
#   - "1.1.1.1"
#   - "9.9.9.9"
raven_subscribe_client_dns_servers: []

# Balancer settings (used in generated client subscription configs)
# Strategy: random, roundRobin, leastPing, leastLoad
raven_subscribe_balancer_strategy: "leastPing"
raven_subscribe_balancer_probe_url: "https://www.gstatic.com/generate_204"
raven_subscribe_balancer_probe_interval: "30s"

# The inbound tag Raven manages users in (must match an inbound in config.d)
raven_subscribe_api_inbound_tag: "vless-reality-in"

# Xray API address for user sync via gRPC. Requires xray_api enabled.
raven_subscribe_xray_api_addr: "127.0.0.1:10085"

# Xray config.d directory (must match xray role)
raven_subscribe_xray_config_dir: "/etc/xray/config.d"

# Per-inbound host overrides. Falls back to raven_subscribe_server_host when tag not listed.
# Set in secrets.yml. With SNI routing both protocols are on :443 behind nginx stream.
# Example: {"vless-reality-in": "zirgate.com", "vless-xhttp-in": "zirgate.com"}
raven_subscribe_inbound_hosts: {}

# Per-inbound port overrides. Falls back to inbound's own port when tag not listed.
# All primary + fallback inbounds share port 443 via nginx stream SNI routing.
raven_subscribe_inbound_ports:
    vless-reality-v2-in: 443
    vless-xhttp-v2-in: 443
    vless-fallback-in: 443

# Fallback subscription inbound allowlist — restricts /sub/fallback/* to outbounds
# whose inbound tag is in this list. Empty = no filtering (legacy behaviour).
# Should contain ONLY isolated fallback-only inbounds (NOT primary inbounds).
raven_subscribe_fallback_inbound_tags:
  - vless-fallback-in

# Bridge user sync — pushes all EU inbound users to xray-bridge transparent inbounds via gRPC.
# Requires xray-bridge Stats API enabled and WireGuard tunnel between EU and RU VPS.
# bridge_api_addr: gRPC address of xray-bridge API (reachable from EU via WireGuard)
# bridge_transparent_tags: maps EU inbound tag → bridge transparent inbound tag
raven_subscribe_bridge_api_addr: ""
raven_subscribe_bridge_transparent_tags: {}

# Enable/disable Xray sync.
raven_subscribe_xray_enabled: true

# System user/group (shared with xray role — do NOT change)
raven_subscribe_user: "xrayuser"
raven_subscribe_group: "xrayuser"

# Xray service name (for systemd After= dependency)
raven_subscribe_xray_service_name: "xray"

##### Set these in secrets.yml (ansible-vault encrypted) #####
# raven_subscribe_server_host: ""     # EU VPS public IP or domain
# raven_subscribe_base_url: ""        # Public URL — must be relay domain, NOT direct EU IP
# raven_subscribe_admin_token: ""     # Generate: openssl rand -hex 32
