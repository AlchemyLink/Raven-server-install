---
- name: Relay | Install nginx and snapd
  ansible.builtin.apt:
    name:
      - nginx
      - snapd
    state: present
    update_cache: true

# libnginx-mod-stream is needed only when nginx comes from Ubuntu distro repos.
# nginx.org packages bundle stream support in the main package — install attempt
# will fail with ABI mismatch in that case, which is expected and harmless.
- name: Relay | Install libnginx-mod-stream (Ubuntu nginx only)
  ansible.builtin.apt:
    name: libnginx-mod-stream
    state: present
  ignore_errors: true

- name: Relay | Remove apt certbot (incompatible with Python 3.11+)
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: absent
    purge: true

- name: Relay | Check if certbot is already installed
  ansible.builtin.command: certbot --version
  register: relay_certbot_check
  changed_when: false
  failed_when: false

- name: Relay | Install certbot via snap
  ansible.builtin.command:
    cmd: snap install --classic certbot
    creates: /snap/bin/certbot
  register: relay_certbot_snap
  failed_when: false
  when: relay_certbot_check.rc != 0

- name: Relay | Install certbot via pip (fallback if snap unavailable)
  ansible.builtin.pip:
    name: certbot
    state: present
    extra_args: "--break-system-packages"
  when:
    - relay_certbot_check.rc != 0
    - relay_certbot_snap is defined
    - relay_certbot_snap.rc is defined
    - relay_certbot_snap.rc != 0

- name: Relay | Ensure certbot symlink (snap)
  ansible.builtin.file:
    src: /snap/bin/certbot
    dest: /usr/bin/certbot
    state: link
    force: true
  when: relay_certbot_snap is defined and relay_certbot_snap.rc is defined and relay_certbot_snap.rc == 0

- name: Relay | Ensure nginx is enabled
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
