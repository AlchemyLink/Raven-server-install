---
raven_dashboard_github_repo: "AlchemyLink/raven-dashboard"
raven_dashboard_install_dir: "/usr/local/bin"
raven_dashboard_config_dir: "/etc/raven-dashboard"
raven_dashboard_data_dir: "/var/lib/raven-dashboard"
raven_dashboard_frontend_dir: "/var/www/raven-dashboard"
# Screenshots referenced by broadcast templates (e.g. v2box-refresh.png).
# Sibling of the SPA root so the unarchive step in frontend.yml never wipes it.
# Served at /screenshots/* by the dashboard SNI vhost (nginx_frontend role).
raven_dashboard_screenshots_dir: "{{ raven_dashboard_frontend_dir }}/screenshots"
raven_dashboard_user: "raven-dashboard"
raven_dashboard_group: "raven-dashboard"
raven_dashboard_service_name: "raven-dashboard"

raven_dashboard_listen_addr: "127.0.0.1:8090"
raven_dashboard_db_path: "{{ raven_dashboard_data_dir }}/dashboard.db"

# Raven-subscribe API — local, same host
raven_dashboard_raven_api_url: "http://127.0.0.1:8080"

# VictoriaMetrics on dedicated EU MON host via DO VPC private network
# (must match monitoring role's victoriametrics_listen). Post-Variant-B
# moved from 10.10.0.2:8428 (RU WG) to MON private IP.
raven_dashboard_prometheus_url: "http://{{ hostvars[groups['mon'][0]].private_ip }}:8428"
raven_dashboard_prometheus_addr: "127.0.0.1:9090"

raven_dashboard_jwt_expiration_seconds: 900
raven_dashboard_refresh_token_expiry_seconds: 604800
raven_dashboard_rate_limit_per_min: 100
raven_dashboard_max_request_body_bytes: 1048576

# Cap concurrent SSE clients on /api/events. Each client holds a 16-event
# buffer + an HTTP goroutine, so unbounded count is a memory-DoS vector.
# 256 is two orders of magnitude over realistic admin-UI concurrency.
raven_dashboard_max_sse_subscribers: 256

# Prefixed onto relative MediaURLs in broadcast templates (e.g. screenshot
# attachments). Empty default is OSS-friendly — relative-path media is
# omitted entirely. Set per-deploy in secrets.yml when self-hosting screenshots,
# e.g. raven_dashboard_broadcast_media_base_url: "https://your-host.example/static"
raven_dashboard_broadcast_media_base_url: ""

# Override per deployment in secrets.yml: set to the public dashboard origin(s),
# e.g. ["https://dashboard.example.com"]. Default is empty — the dev origin
# stays a per-deploy decision rather than a shipped value.
raven_dashboard_cors_allowed_origins: []

# One-shot DB migration from Ansible control node.
# Set to local path of dashboard.db before first deploy; leave empty afterwards.
# Migration is skipped if {{ raven_dashboard_data_dir }}/.migrated exists.
raven_dashboard_db_migrate_src: ""

# Override to deploy a locally-built binary instead of fetching from GitHub releases.
# Example: raven_dashboard_local_binary: "backend/bin/raven-dashboard"
# raven_dashboard_local_binary: ""

# Override to deploy a locally-built frontend instead of fetching from GitHub releases.
# Example: raven_dashboard_local_frontend_tar: "/tmp/raven-dashboard-frontend.tar.gz"
# raven_dashboard_local_frontend_tar: ""

# GitHub PAT for downloading release assets from the private AlchemyLink/raven-dashboard
# repo. Required when raven_dashboard_local_binary / raven_dashboard_local_frontend_tar
# are NOT set. Token needs `repo` scope (or fine-grained: Contents: Read on the repo).
# Empty default — set in secrets.yml. Validated in tasks/main.yml.
raven_dashboard_github_token: ""

##### Set these in secrets.yml (ansible-vault encrypted) #####
# raven_dashboard_jwt_secret: ""              # openssl rand -hex 32 (min 32 chars)
# raven_dashboard_raven_admin_token: ""       # same as raven_subscribe_admin_token
# raven_dashboard_raven_origin_secret: ""     # X-Origin-Secret for Cloudflare-proxied Raven
# raven_dashboard_prometheus_user: ""
# raven_dashboard_prometheus_password: ""
# raven_dashboard_telegram_bot_token: ""      # optional — create via @BotFather; empty = bot disabled
# raven_dashboard_external_probe_token: ""    # optional; empty disables /api/external/probe-result with 401
# raven_dashboard_telegram_alert_chat_ids: [] # optional; chat_ids for probe drift / staleness alerts
# raven_dashboard_xray_stats_anonymize_secret: ""  # MUST equal monitoring.xray_stats_anonymize_secret or per-user PromQL misses every series
# raven_dashboard_github_token: "ghp_..."     # PAT with repo scope; only needed if NOT using local_binary/local_frontend_tar overrides

# ── Backup (hourly SQLite snapshot to MON) ───────────────────────────────────
# Rsync'd over DO VPC to a dedicated unprivileged user on MON, retention 7d
# enforced by daily cron on the receiving side.
raven_dashboard_backup_enabled: true
raven_dashboard_backup_user: "raven-backup"            # system user provisioned on MON
raven_dashboard_backup_ssh_key: "{{ raven_dashboard_data_dir }}/backup_key"
raven_dashboard_backup_retention_days: 7
