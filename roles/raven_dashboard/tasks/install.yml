---
- name: Raven-dashboard | Ensure system group exists
  ansible.builtin.group:
    name: "{{ raven_dashboard_group }}"
    system: true
    state: present

- name: Raven-dashboard | Ensure system user exists
  ansible.builtin.user:
    name: "{{ raven_dashboard_user }}"
    group: "{{ raven_dashboard_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ raven_dashboard_data_dir }}"
    create_home: false
    state: present

- name: Raven-dashboard | Download binary from GitHub releases (private repo via API)
  ansible.builtin.get_url:
    url: >-
      {{
        (_raven_dashboard_assets
          | selectattr('name', 'equalto', 'raven-dashboard-' ~ _raven_dashboard_arch)
          | list
          | first
        ).url
      }}
    dest: "{{ raven_dashboard_install_dir }}/raven-dashboard"
    mode: "0755"
    owner: root
    group: root
    headers:
      Accept: "application/octet-stream"
      Authorization: "token {{ raven_dashboard_github_token }}"
    force: true
  notify: Restart raven-dashboard
  when: raven_dashboard_local_binary is not defined
  no_log: true  # Authorization header would otherwise echo into task output

- name: Raven-dashboard | Copy local binary
  ansible.builtin.copy:
    src: "{{ raven_dashboard_local_binary }}"
    dest: "{{ raven_dashboard_install_dir }}/raven-dashboard"
    mode: "0755"
    owner: root
    group: root
  notify: Restart raven-dashboard
  when: raven_dashboard_local_binary is defined
