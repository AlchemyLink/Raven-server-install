---
- name: Raven-dashboard | Deploy systemd service unit
  ansible.builtin.template:
    src: raven-dashboard.service.j2
    dest: "/etc/systemd/system/{{ raven_dashboard_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  when: ansible_facts.service_mgr == "systemd"
  notify:
    - Reload systemd
    - Restart raven-dashboard

- name: Raven-dashboard | Fix data directory ownership (WAL files)
  ansible.builtin.file:
    path: "{{ raven_dashboard_data_dir }}"
    state: directory
    owner: "{{ raven_dashboard_user }}"
    group: "{{ raven_dashboard_group }}"
    recurse: true

- name: Raven-dashboard | Checkpoint WAL before restart
  ansible.builtin.command:
    cmd: >-
      python3 -c "
      import sqlite3, os
      db = '{{ raven_dashboard_db_path }}'
      if os.path.exists(db):
          conn = sqlite3.connect(db)
          conn.execute('PRAGMA wal_checkpoint(TRUNCATE)')
          conn.commit()
          conn.close()
      "
  become: true
  become_user: "{{ raven_dashboard_user }}"
  changed_when: false

- name: Raven-dashboard | Enable and start service
  ansible.builtin.service:
    name: "{{ raven_dashboard_service_name }}"
    enabled: true
    state: started

- name: Raven-dashboard | Wait for service to be listening
  ansible.builtin.wait_for:
    host: "{{ raven_dashboard_listen_addr.split(':')[0] }}"
    port: "{{ raven_dashboard_listen_addr.split(':')[1] }}"
    timeout: 20
    msg: "raven-dashboard did not start in 20s — check: journalctl -u {{ raven_dashboard_service_name }}"
