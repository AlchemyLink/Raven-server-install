# inventory.ini
# Ansible inventory file для sing-box deployment

[sing_box_servers]
# Укажите IP адрес или hostname вашего сервера
# Примеры:

# По IP адресу с указанием пользователя
your-server ansible_host=1.2.3.4 ansible_user=root ansible_port=22

# По hostname
# server1 ansible_host=workingtest.duckdns.org ansible_user=root

# С использованием SSH ключа
# server2 ansible_host=5.6.7.8 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

[sing_box_servers:vars]
# Общие переменные для всех серверов
ansible_python_interpreter=/usr/bin/python3

# Если используете SSH с паролем (не рекомендуется)
# ansible_ssh_pass=your_password
# ansible_become_pass=your_sudo_password
