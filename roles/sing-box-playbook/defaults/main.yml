# defaults/main.yml
# Default variables for the sing-box role with Hysteria2

# --- Sing-box Download Variables ---
singbox_version: "1.13.3"
singbox_auto_update: true
singbox_repo: "SagerNet/sing-box"
singbox_architecture: "amd64" # Options: amd64, arm64, armv7
singbox_url: "https://github.com/SagerNet/sing-box/releases/download"
singbox_install_dir: "/usr/local/bin"
singbox_config_dir: "/etc/sing-box"
singbox_user: "nobody"

# --- DNS Settings ---
singbox_dns_servers:
  - tag: "google"
    address: "tls://8.8.8.8"
    strategy: "prefer_ipv4"
  - tag: "cloudflare"
    address: "tls://1.1.1.1"
    strategy: "prefer_ipv4"
  - tag: "local"
    address: "local"
    detour: "direct"

# --- Log Settings ---
singbox_log_disabled: false
singbox_log_level: "info"
singbox_log_output: "/var/log/sing-box/box.log"
singbox_log_timestamp: true

# --- Hysteria2 Inbound Configuration ---
singbox_hysteria2_enabled: true
singbox_hysteria2_tag: "hysteria-in"
singbox_hysteria2_listen: "::" # Replace with your server's public IP or "
singbox_hysteria2_listen_port: 8443
singbox_hysteria2_up_mbps: 100
singbox_hysteria2_down_mbps: 100

# Hysteria2 Users (заполните в secrets.yml или переопределите)
# Пример:
# singbox_hysteria2_users:
#   - name: "user1"
#     password: "your-secure-password-here"

# Hysteria2 Obfuscation (опционально)
singbox_hysteria2_obfs_enabled: true
singbox_hysteria2_obfs_type: "salamander"

# Hysteria2 Masquerade (куда перенаправлять неавторизованные запросы)
singbox_hysteria2_masquerade: "https://www.bing.com"

# --- TLS/ACME Configuration ---
singbox:
  tls_enabled: true
  tls_acme_provider: "letsencrypt" # letsencrypt or zerossl
  tls_acme_data_directory: "/etc/sing-box/acme"

# TLS Advanced Settings
singbox_tls_alpn:
  - "h3"
singbox_tls_min_version: "1.3"
singbox_tls_max_version: "1.3"

# --- Outbounds ---
singbox_outbounds:
  - type: "direct"
    tag: "direct"
  - type: "block"
    tag: "block"

# --- Russian Sites Bypass Configuration ---
# Домены для обхода (direct routing)
singbox_bypass_ru_domains:
  - "*.ru"
  - "*.su"
  - "*.рф"
  - "*.moscow"
  - "*.moskva"

# Russian IP ranges bypass (geoip)
singbox_bypass_ru_geoip: true

# Private IP bypass
singbox_bypass_private_ip: true

# --- GeoIP/GeoSite Configuration ---
singbox_geoip_enabled: true
singbox_geoip_url: "https://github.com/SagerNet/sing-geoip/releases/latest/download/geoip.db"
singbox_geoip_path: "/etc/sing-box/geoip.db"

singbox_geosite_enabled: true
singbox_geosite_url: "https://github.com/SagerNet/sing-geosite/releases/latest/download/geosite.db"
singbox_geosite_path: "/etc/sing-box/geosite.db"

# --- Raven-subscribe integration ---
# When enabled, Raven-subscribe will sync Hysteria2 users from sing-box config.
# This variable is consumed by the xray role's raven-subscribe/config.json.j2 template.
# Set raven_subscribe_singbox_config to point to sing-box config file.
# Set raven_subscribe_singbox_enabled: true to activate sync.
#
# These variables are only effective when both roles (xray + sing-box) are deployed together.
# If deploying sing-box standalone, configure Raven manually.
raven_subscribe_singbox_config: "{{ singbox_config_dir }}/config.json"
raven_subscribe_singbox_enabled: true

# --- System Packages ---
