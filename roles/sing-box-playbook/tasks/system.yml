---
- name: sing-box | Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_set: true
    reload: true

- name: sing-box | Disable ICMP echo (ping)
  ansible.posix.sysctl:
    name: net.ipv4.icmp_echo_ignore_all
    value: "1"
    state: present
    sysctl_set: true
    reload: true

- name: sing-box | Optimize network — increase TCP buffer sizes and enable BBR
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - { name: "net.core.rmem_max", value: "134217728" }
    - { name: "net.core.wmem_max", value: "134217728" }
    - { name: "net.ipv4.tcp_rmem", value: "4096 87380 67108864" }
    - { name: "net.ipv4.tcp_wmem", value: "4096 65536 67108864" }
    - { name: "net.ipv4.tcp_congestion_control", value: "bbr" }
