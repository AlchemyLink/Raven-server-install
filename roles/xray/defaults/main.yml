---

xray_common:
  inbound_tag:                           # Common tag for all Xray inbounds
    vless_reality_in: "vless-reality-in"        # Tag for VLESS + XTLS-Reality inbound
    vless_xhttp_in: "vless-xhttp-in"            # Tag for VLESS + XHTTP inbound
    api_in: "api-inbound"                       # Tag for Xray API inbound

xray_install_dir: /opt/xray                   # Xray installation directory
xray_config_dir: /etc/xray/                    # Directory for Xray configuration files
xray_service_name: xray                       # Xray systemd service name
xray_github_repo: XTLS/Xray-core              # Xray GitHub repository
xray_download_url: "https://github.com/{{ xray_github_repo }}/releases/download/{{ xray_version }}/Xray-linux-64.zip" # Download URL for Xray
xray_user: "xrayuser"                         # System user to run Xray (shared with raven-subscribe)
xray_group: "xrayuser"                        # System group to run Xray (shared with raven-subscribe)
xray_log_dir: "/var/log/Xray"                 # Directory for Xray logs
xray_bin_dir: "/usr/local/bin"                # Directory for Xray binaries
xray_nologin_shell: "/usr/sbin/nologin"       # Shell for the Xray user (to prevent login)

# VLESS + XTLS-Reality Configuration (TCP)
# Listens on localhost — nginx stream SNI routing on :443 forwards traffic here.
xray_vless_tag: vless-reality-in              # Tag for VLESS inbound
xray_vless_port: 4443                         # Local port (behind nginx stream SNI routing on :443)
xray_vless_listen: "127.0.0.1"               # Bind to localhost only (nginx stream fronts :443)
xray_reality_dest: "askubuntu.com:443"        # Destination for XTLS-Reality (camouflage domain)
xray_reality_server_names:                    # SNI names for Reality TCP (must match dest)
  - "askubuntu.com"

# VLESS Encryption — server inbound decryption string (Xray-core >= 25.x, PR #5067).
# "none" — standard VLESS, no extra encryption layer, compatible with all clients.
# VLESS Encryption: full mlkem768x25519plus string generated by: xray vlessenc
#   Format: "mlkem768x25519plus.native/xorpub/random.600s.(pad).(X25519 PrivKey).(ML-KEM-768 Seed)"
# When set: all clients must use xray_vless_client_encryption (different string, public keys only).
# When set: flow is forced to xtls-rprx-vision for all users.
xray_vless_decryption: "none"

# VLESS Encryption — client outbound encryption string (public keys, safe to share).
# Must match xray_vless_decryption. "none" when decryption is "none".
#   Format: "mlkem768x25519plus.native/xorpub/random.0rtt/1rtt.(pad).(X25519 Password).(ML-KEM-768 Client)"
xray_vless_client_encryption: "none"

# Если в xray_users у пользователя не задан flow — используется это значение (Vision для TCP/XHTTP+REALITY).
# См. https://xtls.github.io/en/config/inbounds/vless.html — flow
xray_vless_default_flow: "xtls-rprx-vision"

# DNS for config
xray_dns_servers:                             # List of DNS servers for Xray
  - "tcp+local://8.8.8.8"                     # Google DNS, local (bypasses proxy)
  - "tcp+local://1.1.1.1"                     # Cloudflare DNS, local (bypasses proxy)
  # DoH servers (https://) are NOT recommended here — they route
  # through the proxy chain and fail with "closed pipe" on reconnect.
xray_dns_disable_fallback: false              # Set to true to disable fallback to system DNS
xray_dns_query_strategy: "UseIPv4"            # DNS query strategy: "UseIP", "UseIPIfNonMatch", "UseIPv4", "UseIPv6"

# Log vars
xray_log_config:
  service_rotate_name: logrotate.service    # Logrotate service name for Xray logs
  log_level: "warning"                      # Log level for Xray (debug, info, warning, error, none)
  log_path: "/var/log/Xray"                # Directory for Xray logs
  access_log: "access.log"                  # Path for Xray access log
  error_log: "error.log"                    # Path for Xray error log
  logrotate_config: "/etc/logrotate.d/xray" # Path for logrotate configuration
  dns_log: false                            # Enable or disable DNS logging

# Blocked domains
xray_blocked_domains:                         # List of domains to block
  - "geosite:category-ads-all"
  - "geosite:category-ads"
  - "geosite:category-public-tracker"
  - "geosite:google-ads"
  - "geosite:spotify-ads"

# Xray Reality api configuration
xray_api:
  enable: true                               # Enable Xray API
  services:                                   # List of API services
    - "StatsService"                          # Service for statistics
    - "HandlerService"                        # Service for handling requests
    - "ReflectionService"                     # Service for list other services
    # - "LoggerService"                         # Service for logging
  inbound:
    address: "127.0.0.1"                      # API address (localhost)
    port: 10085                               # API port
    protocol: "dokodemo-door"                 # Protocol for API (dokodemo-door)"
    tag: "api-inbound"

# Xray XHTTP + Reality configuration
# Listens on localhost — nginx stream SNI routing on :443 forwards traffic here.
# Uses separate Reality dest/serverNames from TCP Reality (different SNI for SNI-based routing).
xray_xhttp:
  tag: "vless-xhttp-in"                       # Tag for XHTTP inbound
  port: 2053                                  # Local port (behind nginx stream SNI routing on :443)
  listen: "127.0.0.1"                         # Bind to localhost only (nginx stream fronts :443)
  network: "xhttp"                             # Network type
  xhttpSettings:
    mode: "auto"
    path: "/api/v3/data-sync"
    scMaxPacketSize: 50000
  reality:                                     # XHTTP-specific Reality settings (separate from TCP Reality)
    dest: "www.adobe.com:443"                  # Camouflage domain (TLS 1.3, H2, OCSP, Akamai CDN)
    server_names:
      - "www.adobe.com"


