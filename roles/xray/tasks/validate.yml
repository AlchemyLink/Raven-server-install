---
- name: Xray | Validate xray_vless_decryption value
  ansible.builtin.assert:
    that:
      - xray_vless_decryption | default('none') == 'none'
        or (xray_vless_decryption | default('none')).startswith('mlkem768x25519plus.')
    fail_msg: >-
      xray_vless_decryption must be "none" or a valid VLESS Encryption string
      starting with "mlkem768x25519plus.".
      Generate with: xray vlessenc
      See https://xtls.github.io/config/inbounds/vless.html
    success_msg: "xray_vless_decryption is valid"

- name: Xray | Validate xray_vless_client_encryption matches decryption mode
  ansible.builtin.assert:
    that:
      - (xray_vless_decryption | default('none') == 'none') == (xray_vless_client_encryption | default('none') == 'none')
    fail_msg: >-
      xray_vless_decryption and xray_vless_client_encryption must be both "none"
      or both set to VLESS Encryption strings (server and client keys differ).
      Generate both with: xray vlessenc
    success_msg: "xray_vless_client_encryption is consistent with decryption"

- name: Xray | Validate xray_api.inbound.address is loopback (M7 — never expose API publicly)
  ansible.builtin.assert:
    that:
      - xray_api.inbound.address | default('') in ['127.0.0.1', '::1', 'localhost']
    fail_msg: >-
      xray_api.inbound.address is "{{ xray_api.inbound.address | default('<unset>') }}".
      Xray API exposes HandlerService (add/remove inbounds, users) and StatsService
      over plaintext gRPC. It MUST listen on loopback only — binding to a public
      interface gives anyone on the internet full admin control of Xray.
      Set `xray_api.inbound.address: 127.0.0.1` (or ::1 / localhost).
    success_msg: "xray_api.inbound.address is loopback ({{ xray_api.inbound.address }})"
  when: xray_api.enable | default(false)

- name: Xray | Validate xray_users is defined and non-empty
  ansible.builtin.assert:
    that:
      - xray_users is defined
      - xray_users | length > 0
    fail_msg: >-
      xray_users is not defined or empty.
      Define at least one user in secrets.yml.
    success_msg: "xray_users is valid"

- name: Xray | Validate each user has id and email
  ansible.builtin.assert:
    that:
      - item.id is defined and item.id != ''
      - item.email is defined and item.email != ''
    fail_msg: >-
      User entry is missing required fields.
      Each user must have 'id' (UUID) and 'email'.
      Offending entry: {{ item }}
    success_msg: "User {{ item.email }} is valid"
  loop: "{{ xray_users }}"

- name: Xray | Warn if DoH servers are in xray_dns_servers
  ansible.builtin.assert:
    that:
      - xray_dns_servers | select('match', '^https://') | list | length == 0
    fail_msg: >-
      xray_dns_servers contains DoH URL (https://).
      DoH routes through the proxy chain and causes
      "closed pipe" errors. Use tcp+local://8.8.8.8 instead.
    success_msg: "DNS servers config is valid"

- name: Xray | Validate xray_v2_reality keys are defined
  ansible.builtin.assert:
    that:
      - xray_v2_reality is defined
      - xray_v2_reality.private_key is defined
      - xray_v2_reality.private_key != ''
      - xray_v2_reality.short_id is defined
      - xray_v2_reality.short_id | length > 0
    fail_msg: >-
      xray_v2_reality is missing required keys.
      Ensure private_key and short_id are set in secrets.yml.
    success_msg: "xray_v2_reality keys are valid"

- name: Xray | Validate xray_v2_testseed format
  when: xray_v2_testseed | default([]) | length > 0
  ansible.builtin.assert:
    that:
      - xray_v2_testseed | length == 4
      - xray_v2_testseed | map('int') | list | length == 4
    fail_msg: >-
      xray_v2_testseed must be a list of exactly 4 integers, e.g. [900, 500, 900, 256].
      Got: {{ xray_v2_testseed }}
    success_msg: "xray_v2_testseed is valid: {{ xray_v2_testseed }}"

- name: Xray | Validate primary v2 inbound config when enabled
  when: xray_v2_inbounds_enabled | default(false)
  block:
    - name: Xray | Validate v2 VLESS port differs from XHTTP port
      ansible.builtin.assert:
        that:
          - xray_v2_vless.port != xray_v2_xhttp.port
        fail_msg: >-
          xray_v2_vless.port ({{ xray_v2_vless.port }}) must differ from
          xray_v2_xhttp.port ({{ xray_v2_xhttp.port }}).
        success_msg: "v2 inbound ports are unique"

    - name: Xray | Validate v2 Reality keys (when overridden)
      when: xray_v2_reality is defined
      ansible.builtin.assert:
        that:
          - xray_v2_reality.private_key is defined
          - xray_v2_reality.private_key != ''
          - xray_v2_reality.short_id is defined
          - xray_v2_reality.short_id | length > 0
        fail_msg: >-
          xray_v2_reality is defined but missing required keys.
          Ensure private_key and short_id are set.
        success_msg: "v2 Reality keys are valid"

- name: Xray | Validate fallback inbound when enabled
  when: xray_fallback_enabled | default(false)
  block:
    - name: Xray | Validate fallback Reality keypair
      ansible.builtin.assert:
        that:
          - xray_fallback_reality is defined
          - xray_fallback_reality.private_key is defined
          - xray_fallback_reality.private_key != ''
          - xray_fallback_reality.short_id is defined
          - xray_fallback_reality.short_id | length > 0
        fail_msg: >-
          xray_fallback_reality is missing required keys (private_key, short_id).
          Generate with: xray x25519 + openssl rand -hex 8.
          Must be ISOLATED from xray_reality / xray_v2_reality.
        success_msg: "fallback Reality keypair is valid"

    - name: Xray | Validate fallback serverNames non-empty
      ansible.builtin.assert:
        that:
          - xray_fallback.reality.server_names is defined
          - xray_fallback.reality.server_names | length > 0
        fail_msg: >-
          xray_fallback.reality.server_names must contain at least one SNI.
        success_msg: "fallback serverNames count: {{ xray_fallback.reality.server_names | length }}"

    - name: Xray | Validate fallback VLESS Encryption keys
      ansible.builtin.assert:
        that:
          - xray_vless_fallback_decryption | default('none') == 'none'
            or (xray_vless_fallback_decryption | default('none')).startswith('mlkem768x25519plus.')
          - (xray_vless_fallback_decryption | default('none') == 'none') == (xray_vless_fallback_client_encryption | default('none') == 'none')
        fail_msg: >-
          xray_vless_fallback_decryption / xray_vless_fallback_client_encryption must be both "none"
          or both valid mlkem768x25519plus.* strings.
          Generate with: xray vlessenc.
        success_msg: "fallback VLESS Encryption keypair is valid"

    - name: Xray | Validate fallback port unique
      ansible.builtin.assert:
        that:
          - not (xray_v2_inbounds_enabled | default(false)) or xray_fallback.port != xray_v2_vless.port
          - not (xray_v2_inbounds_enabled | default(false)) or xray_fallback.port != xray_v2_xhttp.port
        fail_msg: >-
          xray_fallback.port ({{ xray_fallback.port }}) must differ from all other inbound ports.
        success_msg: "fallback port is unique: {{ xray_fallback.port }}"

    - name: Xray | Validate fallback transport
      ansible.builtin.assert:
        that:
          - (xray_fallback.network | default('xhttp')) in ['tcp', 'xhttp']
        fail_msg: >-
          xray_fallback.network must be 'tcp' (Reality+Vision) or 'xhttp' (Reality+XHTTP).
        success_msg: "fallback transport: {{ xray_fallback.network | default('xhttp') }}"

    # XHTTP is incompatible with xtls-rprx-vision flow, and VLESS Encryption in
    # this stack forces Vision (Raven-subscribe generator + legacy templates).
    # Therefore an XHTTP fallback MUST run with decryption=none and a fully
    # specified xhttpSettings block (mode/path/scMaxPacketSize).
    - name: Xray | Validate XHTTP fallback constraints
      when: (xray_fallback.network | default('xhttp')) == 'xhttp'
      ansible.builtin.assert:
        that:
          - (xray_vless_fallback_decryption | default('none')) == 'none'
          - xray_fallback.xhttpSettings is defined
          - xray_fallback.xhttpSettings.mode is defined
          - xray_fallback.xhttpSettings.path is defined
          - xray_fallback.xhttpSettings.scMaxPacketSize is defined
        fail_msg: >-
          XHTTP fallback requires xray_vless_fallback_decryption='none' (VLESS
          Encryption forces Vision, which XHTTP cannot use) and a complete
          xray_fallback.xhttpSettings (mode, path, scMaxPacketSize).
        success_msg: "XHTTP fallback constraints satisfied (mode={{ xray_fallback.xhttpSettings.mode }}, path={{ xray_fallback.xhttpSettings.path }})"

- name: Xray | Validate experimental inbound when enabled
  when: xray_experimental_enabled | default(false)
  block:
    - name: Xray | Validate experimental Reality keypair (isolated)
      ansible.builtin.assert:
        that:
          - xray_experimental_reality is defined
          - xray_experimental_reality.private_key is defined
          - xray_experimental_reality.private_key != ''
          - xray_experimental_reality.short_id is defined
          - xray_experimental_reality.short_id | length > 0
        fail_msg: >-
          xray_experimental_reality is missing required keys (private_key, short_id).
          Generate with: xray x25519 + openssl rand -hex 8.
          Must be ISOLATED from xray_v2_reality / xray_fallback_reality.
        success_msg: "experimental Reality keypair is valid"

    - name: Xray | Validate experimental serverNames non-empty
      ansible.builtin.assert:
        that:
          - xray_experimental.reality.server_names is defined
          - xray_experimental.reality.server_names | length > 0
        fail_msg: >-
          xray_experimental.reality.server_names must contain at least one SNI.
        success_msg: "experimental serverNames count: {{ xray_experimental.reality.server_names | length }}"

    - name: Xray | Validate experimental port unique
      ansible.builtin.assert:
        that:
          - not (xray_v2_inbounds_enabled | default(false)) or xray_experimental.port != xray_v2_vless.port
          - not (xray_v2_inbounds_enabled | default(false)) or xray_experimental.port != xray_v2_xhttp.port
          - not (xray_fallback_enabled | default(false)) or xray_experimental.port != xray_fallback.port
        fail_msg: >-
          xray_experimental.port ({{ xray_experimental.port }}) must differ from all other inbound ports.
        success_msg: "experimental port is unique: {{ xray_experimental.port }}"

    - name: Xray | Validate experimental XHTTP settings
      ansible.builtin.assert:
        that:
          - (xray_experimental.network | default('xhttp')) == 'xhttp'
          - xray_experimental.xhttpSettings is defined
          - xray_experimental.xhttpSettings.mode is defined
          - xray_experimental.xhttpSettings.path is defined
        fail_msg: >-
          experimental inbound requires network 'xhttp' and a complete
          xray_experimental.xhttpSettings (mode, path).
        success_msg: "experimental XHTTP settings OK (mode={{ xray_experimental.xhttpSettings.mode }}, path={{ xray_experimental.xhttpSettings.path }})"
