# File: roles/xray/tasks/install.yml

---
- name: "Ensure the {{ xray_group }} group exists"
  ansible.builtin.group:
    name: "{{ xray_group }}"
    state: present
    system: true

- name: Set nologin shell path based on OS family
  ansible.builtin.set_fact:
    nologin_shell: |
      {% if ansible_facts['os_family'] == 'Alpine' %}
      /sbin/nologin
      {% else %}
      /usr/sbin/nologin
      {% endif %}

- name: Create a dedicated system user for Xray ({{ xray_user }})
  ansible.builtin.user:
    name: "{{ xray_user }}"
    state: present
    system: true
    shell: "{{ nologin_shell | trim }}"
    group: "{{ xray_group }}"

- name: Ensure Xray log directory exists and has correct permissions
  ansible.builtin.file:
    path: "{{ xray_log_dir }}"
    state: directory
    owner: "{{ xray_user }}"
    group: "{{ xray_group }}"
    mode: "0755"
    recurse: true

- name: Ensure Xray configuration directory exists and has correct permissions
  ansible.builtin.file:
    path: "{{ xray_config_dir }}"
    state: directory
    owner: "{{ xray_user }}"
    group: "{{ xray_group }}"

    mode: "0755"
    recurse: true

- name: "Correct ownership for Xray executable (if needed)"
  ansible.builtin.file:
    path: "{{ xray_bin_dir }}/xray"
    owner: "{{ xray_user }}"
    group: "{{ xray_group }}"

    mode: "0755"
  failed_when: false
  when: xray_bin_dir is defined and xray_bin_dir != ''

- name: Ensure Xray install directory exists with correct ownership
  ansible.builtin.file:
    path: "{{ xray_install_dir }}"
    state: directory
    owner: "{{ xray_user }}"
    group: "{{ xray_group }}"
    mode: "0755"

- name: Ensure Xray config directory exists
  ansible.builtin.file:
    path: "{{ xray_config_dir }}config.d"
    state: directory

    mode: "0755"

- name: Get latest Xray release version
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ xray_github_repo }}/releases/latest"
    method: GET
    return_content: true
    headers:
      Accept: "application/vnd.github.v3+json"
    status_code: 200
  register: xray_release_info
  run_once: true
  retries: 3
  delay: 3
  until: xray_release_info.status == 200

- name: Set Xray version fact
  ansible.builtin.set_fact:
    xray_version: "{{ xray_release_info.json.tag_name }}"
    ansible_version_full: "{{ ansible_version.full }}"

- name: Detect architecture for Xray
  ansible.builtin.set_fact:
    xray_arch: >-
      {{
        '64' if ansible_architecture in ['x86_64', 'amd64']
        else 'arm64-v8a' if ansible_architecture in ['aarch64', 'arm64']
        else ansible_architecture
      }}

- name: Set Xray download URL for detected architecture
  ansible.builtin.set_fact:
    xray_download_url: "https://github.com/{{ xray_github_repo }}/releases/download/{{ xray_version }}/Xray-linux-{{ xray_arch }}.zip"

- name: Download Xray using get_url (Ansible >= 2.16.0)
  block:
    - name: Download Xray archive (Ansible >= 2.16.0)
      ansible.builtin.get_url:
        url: "{{ xray_download_url }}"
        dest: "/tmp/Xray-{{ xray_version }}-linux-{{ xray_arch }}.zip"

        mode: "0644"
      register: download_xray
    - name: Unarchive Xray
      ansible.builtin.unarchive:
        src: "{{ download_xray.dest }}"
        dest: "{{ xray_install_dir }}"
        remote_src: true
  when: ansible_version_full is version('2.16.0', '>=')

  notify: "Restart xray"

- name: Download Xray using curl (Ansible < 2.16.0)
  block:
    - name: Download Xray archive (Ansible < 2.16.0)
      ansible.builtin.command: >
        curl -L --output /tmp/Xray-{{ xray_version }}-linux-{{ xray_arch }}.zip "{{ xray_download_url }}"
      args:
        creates: "/tmp/Xray-{{ xray_version }}-linux-{{ xray_arch }}.zip"
      register: download_xray
      changed_when: download_xray.rc == 0 and not "already exists" in download_xray.stdout
    - name: Unarchive Xray
      ansible.builtin.unarchive:
        src: "/tmp/Xray-{{ xray_version }}-linux-{{ xray_arch }}.zip"
        dest: "{{ xray_install_dir }}"
        remote_src: true
  when: ansible_version_full is version('2.16.0', '<')

  notify: "Restart xray"

- name: Create symlink for Xray executable
  ansible.builtin.file:
    src: "{{ xray_install_dir }}/xray"
    dest: /usr/local/bin/xray
    state: link
    force: true

# ── Geo data (ensure Loyalsoldier enhanced build is present) ─────────────────
# The Xray-core zip includes basic v2fly geoip/geosite, but routing config uses
# categories like geosite:category-gov-ru that require the enhanced Loyalsoldier
# build. Download unconditionally to keep assets fresh.
- name: Download Loyalsoldier geosite.dat
  ansible.builtin.get_url:
    url: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
    dest: "{{ xray_install_dir }}/geosite.dat"
    mode: "0644"
    owner: "{{ xray_user }}"
    group: "{{ xray_group }}"
  retries: 3
  delay: 3

- name: Download Loyalsoldier geoip.dat
  ansible.builtin.get_url:
    url: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"
    dest: "{{ xray_install_dir }}/geoip.dat"
    mode: "0644"
    owner: "{{ xray_user }}"
    group: "{{ xray_group }}"
  retries: 3
  delay: 3

- name: Deploy Logrotate configuration for Xray
  ansible.builtin.template:
    src: logrotate.json.j2
    dest: /etc/logrotate.d/xray

    mode: "0644"
  notify:

    - Restart xray

