---
# nginx_frontend role — TLS frontend + SNI stream routing for EU VPS
#
# Responsibilities:
#   - Install nginx + certbot
#   - Obtain Let's Encrypt certificate for nginx_frontend_domain
#   - SNI routing on :443 → Xray XHTTP, Xray Reality, or nginx HTTPS
#   - Proxy Raven-subscribe (/sub/, /c/, /api/, /health) on :8443

# ── Domain & TLS ──────────────────────────────────────────────────────────────
nginx_frontend_domain: "_"  # server_name (relay doesn't check, can be anything)

# Self-signed cert (generated by install task). No Let's Encrypt needed —
# only the RU relay connects here and it doesn't verify the cert.
nginx_frontend_ssl_cert: "/etc/nginx/ssl/nginx-frontend.crt"
nginx_frontend_ssl_key: "/etc/nginx/ssl/nginx-frontend.key"

# ── nginx HTTPS listen port ──────────────────────────────────────────────────
# Serves Raven-subscribe (subscriptions + admin API) and acts as Reality dest
# for XHTTP probe responses. NOT the main entry point — :443 stream is.
nginx_frontend_listen_port: 8443

# ── Raven-subscribe upstream ──────────────────────────────────────────────────
nginx_frontend_raven_port: 8080    # Must match raven_subscribe_listen_addr port

# ── SNI stream routing on :443 ───────────────────────────────────────────────
# nginx stream with ssl_preread reads SNI from TLS ClientHello and routes:
#   SNI = xhttp_sni (e.g. www.adobe.com)  → Xray XHTTP+Reality (xhttp_port)
#   SNI = nginx_frontend_domain           → nginx HTTPS (listen_port) for Raven
#   default (e.g. askubuntu.com)          → Xray Reality TCP (reality_port)
nginx_frontend_stream_enabled: true
nginx_frontend_stream_xhttp_sni: "www.adobe.com"   # Must match xray_xhttp.reality.server_names[0]
nginx_frontend_stream_xhttp_port: 2053              # Must match xray_xhttp.port
nginx_frontend_stream_reality_port: 4443            # Must match xray_vless_port

# ── V2 parallel inbounds (disabled by default) ──────────────────────────────
# When xray_v2_inbounds_enabled is true, nginx routes additional SNIs
# to v2 Xray inbounds on separate ports.
nginx_frontend_stream_v2_enabled: false              # Set to true when v2 inbounds are active
nginx_frontend_stream_v2_xhttp_sni: "addons.mozilla.org"   # Must match xray_v2_xhttp.reality.server_names[0]
nginx_frontend_stream_v2_xhttp_port: 2054                   # Must match xray_v2_xhttp.port
nginx_frontend_stream_v2_reality_sni: "dl.google.com"       # Must match xray_v2_vless.reality.server_names[0]
nginx_frontend_stream_v2_reality_port: 4444                  # Must match xray_v2_vless.port
