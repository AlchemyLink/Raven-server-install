---
# nginx_frontend role — TLS frontend + SNI stream routing for EU VPS
#
# Responsibilities:
#   - Install nginx + certbot
#   - Obtain Let's Encrypt certificate for nginx_frontend_domain
#   - SNI routing on :443 → Xray XHTTP, Xray Reality, or nginx HTTPS
#   - Proxy Raven-subscribe (/sub/, /c/, /api/, /health) on :8443

# ── nginx HTTPS listen port ──────────────────────────────────────────────────
# Serves Raven-subscribe (subscriptions + admin API) and acts as Reality dest
# for XHTTP probe responses. NOT the main entry point — :443 stream is.
nginx_frontend_listen_port: 8443

# ── Raven-subscribe upstream ──────────────────────────────────────────────────
nginx_frontend_raven_port: 8080    # Must match raven_subscribe_listen_addr port

# ── SNI stream routing on :443 ───────────────────────────────────────────────
# nginx stream with ssl_preread reads SNI from TLS ClientHello and routes:
#   SNI = primary v2 inbounds → Xray Reality v2 (mldsa65)
#   SNI = fallback inbounds → Xray Reality fallback (isolated keys)
#   default (other SNI)       → tcp_close (immediate RST, no TLS response)
nginx_frontend_stream_enabled: true

# Primary v2 inbounds (Xray-core >= v26.3.27 with mldsa65)
nginx_frontend_stream_v2_enabled: true
nginx_frontend_stream_v2_reality_sni: "dl.google.com"        # Must match xray_v2_vless.reality.server_names[0]
nginx_frontend_stream_v2_reality_port: 4444                  # Must match xray_v2_vless.port
nginx_frontend_stream_v2_xhttp_sni: "addons.mozilla.org"     # Must match xray_v2_xhttp.reality.server_names[0]
nginx_frontend_stream_v2_xhttp_port: 2054                    # Must match xray_v2_xhttp.port

# Fallback inbound — multi-SNI на StackExchange-инфраструктуре (один upstream)
# Все 4 SNI идут на один backend port — Reality сама выбирает соединение по UIRD-маркеру.
# StackExchange использует SNI-virtual-hosting → cert всегда совпадает с любым из этих SNI.
nginx_frontend_stream_fallback_enabled: true
nginx_frontend_stream_fallback_port: 5443                    # Must match xray_fallback.port
nginx_frontend_stream_fallback_snis:                          # Must match xray_fallback.reality.server_names
  - "stackoverflow.com"
  - "superuser.com"
  - "serverfault.com"
  - "unix.stackexchange.com"

# ── Raven Dashboard SNI integration ──────────────────────────────────────────
# Routes SNI <dashboard_domain> → separate nginx HTTPS server on dashboard_port.
# Requires raven_dashboard role deployed and listening on dashboard_backend_port.
nginx_frontend_dashboard_enabled: true
nginx_frontend_dashboard_port: 8444          # nginx HTTPS listen port for dashboard
nginx_frontend_dashboard_backend_port: 8090  # raven-dashboard listen port (must match raven_dashboard_listen_addr)
nginx_frontend_dashboard_frontend_dir: "/var/www/raven-dashboard"  # must match raven_dashboard_frontend_dir

# ── Fallback subscription endpoint (<sub_domain> → EU-direct) ────────────────
# When enabled, routes SNI nginx_frontend_sub_sni → separate nginx HTTPS server on sub_port.
# Exposes only /sub/fallback/ and /c/fallback/ — no admin API, no primary subscriptions.
# Set nginx_frontend_sub_sni and nginx_frontend_sub_cf_secret in secrets.yml.
nginx_frontend_sub_enabled: false
nginx_frontend_sub_port: 8445              # nginx HTTPS listen port for fallback sub

# Cloudflare origin secret — rejects requests not arriving via Cloudflare.
# Must match the value injected by Cloudflare Transform Rule as X-Origin-Secret header.
# Generate: openssl rand -hex 32
# Set in roles/nginx_frontend/defaults/secrets.yml (vault-encrypted).
