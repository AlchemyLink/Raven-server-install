---
- name: Nginx frontend | Remove orphan stream configs (old domain names)
  ansible.builtin.shell: |
    find /etc/nginx/stream.d/ -name '*.conf' \
      ! -name '{{ nginx_frontend_domain }}.conf' \
      -delete
  changed_when: false
  tags: nginx_frontend_stream

- name: Nginx frontend | Ensure stream.d directory exists
  ansible.builtin.file:
    path: /etc/nginx/stream.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Nginx frontend | Ensure stream block include in nginx.conf
  ansible.builtin.blockinfile:
    path: /etc/nginx/nginx.conf
    marker: "# {mark} ANSIBLE MANAGED stream block"
    block: |
      stream {
          include /etc/nginx/stream.d/*.conf;
      }
    insertafter: EOF
  notify: Reload nginx

- name: Nginx frontend | Deploy SNI stream routing config
  ansible.builtin.template:
    src: nginx/stream.conf.j2
    dest: "/etc/nginx/stream.d/{{ nginx_frontend_domain }}.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  when: nginx_frontend_stream_enabled

- name: Nginx frontend | Remove SNI stream config (disabled)
  ansible.builtin.file:
    path: "/etc/nginx/stream.d/{{ nginx_frontend_domain }}.conf"
    state: absent
  notify: Reload nginx
  when: not nginx_frontend_stream_enabled
