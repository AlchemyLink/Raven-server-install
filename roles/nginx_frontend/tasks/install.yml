---
- name: Nginx frontend | Install nginx and certbot
  ansible.builtin.apt:
    name:
      - nginx
      - libnginx-mod-stream
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: true

- name: Nginx frontend | Ensure nginx is enabled and started
  ansible.builtin.service:
    name: nginx
    enabled: true
    state: started
