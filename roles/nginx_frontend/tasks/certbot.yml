---
- name: Nginx frontend | Ensure ssl directory exists
  ansible.builtin.file:
    path: /etc/nginx/ssl
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Nginx frontend | Check if self-signed cert exists
  ansible.builtin.stat:
    path: /etc/nginx/ssl/nginx-frontend.crt
  register: nginx_frontend_cert

- name: Nginx frontend | Generate self-signed certificate
  ansible.builtin.command:
    cmd: >
      openssl req -x509 -nodes -days 3650 -newkey rsa:2048
      -keyout /etc/nginx/ssl/nginx-frontend.key
      -out /etc/nginx/ssl/nginx-frontend.crt
      -subj "/CN=nginx-frontend"
  when: not nginx_frontend_cert.stat.exists
  notify: Reload nginx
