---
# xray_bridge role — Xray chain proxy on RU VPS
#
# Architecture:
#   Client → RU nginx:443 (SNI routing) → RU Xray:bridge_port (VLESS+Reality)
#                                             ↓ outbound via XHTTP packet-up
#                                        EU Xray:443 (XHTTP inbound)
#                                             ↓
#                                        Internet
#
# Split routing on RU bridge:
#   .ru / .su / .рф / private IPs → freedom (direct from RU)
#   everything else               → chain to EU Xray
#
# Deployment:
#   - Installs Xray binary on RU VPS (/usr/local/bin/xray)
#   - Creates separate xray-bridge systemd service (/etc/xray-bridge/)
#   - Does NOT conflict with existing nginx relay
#   - Nginx stream on RU must route bridge SNI to xray_bridge_port (see relay role)

# ── Bridge identity ───────────────────────────────────────────────────────────
xray_bridge_service_name: "xray-bridge"
xray_bridge_install_dir: "/opt/xray-bridge"
xray_bridge_config_dir: "/etc/xray-bridge/"
xray_bridge_log_dir: "/var/log/xray-bridge"
xray_bridge_user: "xraybridgeuser"
xray_bridge_group: "xraybridgeuser"
xray_bridge_bin_dir: "/usr/local/bin"

# ── Bridge inbound (accepting client connections) ─────────────────────────────
# Listens on localhost — nginx stream SNI routing on :443 forwards here.
# Relay role must set relay_bridge_enabled=true and relay_bridge_sni to match.
xray_bridge_port: 5443
xray_bridge_listen: "127.0.0.1"
xray_bridge_tag_in: "vless-bridge-in"

# Reality dest for bridge inbound — must be TLS 1.3 + H2, different from EU Reality dests.
# Clients connect using this domain as SNI.
xray_bridge_reality_dest: "www.wikipedia.org:443"
xray_bridge_reality_server_names:
  - "www.wikipedia.org"

# Vision flow for all bridge clients
xray_bridge_vless_default_flow: "xtls-rprx-vision"

# Optional Vision testseed (same format as xray_testseed)
# xray_bridge_testseed: [900, 500, 900, 256]

# ── Outbound to EU Xray (chain link) ─────────────────────────────────────────
# RU Xray connects to EU Xray's XHTTP inbound via XHTTP packet-up mode.
# EU nginx routes this SNI to EU Xray's XHTTP port.
xray_bridge_tag_out: "chain-out-eu"

# EU Xray's XHTTP Reality destination SNI (must match nginx_frontend_stream_xhttp_sni on EU)
xray_bridge_eu_xhttp_sni: "www.adobe.com"

# XHTTP path (must match xray_xhttp.xhttpSettings.path on EU)
xray_bridge_eu_xhttp_path: "/api/v3/data-sync"

# Mode: packet-up preserves packet boundaries through the chain (better for mixed traffic)
xray_bridge_eu_xhttp_mode: "packet-up"

# Fingerprint for uTLS (impersonates Chrome TLS fingerprint toward EU)
xray_bridge_eu_fingerprint: "chrome"

# EU server port (nginx frontend port — always 443 via SNI relay)
xray_bridge_eu_port: 443

# EU Reality public key and short ID — from EU xray_reality in secrets.yml
# Must be set in xray_bridge secrets:
#   xray_bridge_eu_reality_public_key: "PublicKeyHere"
#   xray_bridge_eu_reality_short_id: "shortIdHere"
#   xray_bridge_eu_host: "1.2.3.4"    # EU VPS IP (direct, bypasses RU relay)
#   xray_bridge_eu_user_id: "uuid"    # UUID of bridge user registered on EU Xray

# ── Split routing ─────────────────────────────────────────────────────────────
# Domains and IPs that should bypass the chain and go direct from RU.
xray_bridge_direct_domains:
  - "geosite:ru"
  - "domain:su"
  - "domain:рф"

xray_bridge_direct_ips:
  - "geoip:ru"
  - "geoip:private"

# Ads/trackers to block outright
xray_bridge_blocked_domains:
  - "geosite:category-ads-all"

# domainStrategy for routing: IPIfNonMatch resolves unmatched domains to IP for geoip rules
xray_bridge_domain_strategy: "IPIfNonMatch"

# ── Logging ───────────────────────────────────────────────────────────────────
xray_bridge_log_level: "warning"

# ── Install ───────────────────────────────────────────────────────────────────
xray_github_repo: "XTLS/Xray-core"   # shared with xray role

