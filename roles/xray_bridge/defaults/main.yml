---
# xray_bridge role — Xray chain proxy on RU VPS
#
# Architecture:
#   Client → RU nginx:443 (SNI routing) → RU Xray:bridge_port (VLESS+Reality)
#                                             ↓ outbound via XHTTP packet-up
#                                        EU Xray:443 (XHTTP inbound)
#                                             ↓
#                                        Internet
#
# Split routing on RU bridge:
#   .ru / .su / .рф / private IPs → freedom (direct from RU)
#   everything else               → chain to EU Xray
#
# Deployment:
#   - Installs Xray binary on RU VPS (/usr/local/bin/xray)
#   - Creates separate xray-bridge systemd service (/etc/xray-bridge/)
#   - Does NOT conflict with existing nginx relay
#   - Nginx stream on RU must route bridge SNI to xray_bridge_port (see relay role)

# ── Bridge identity ───────────────────────────────────────────────────────────
xray_bridge_service_name: "xray-bridge"
xray_bridge_install_dir: "/opt/xray-bridge"
xray_bridge_config_dir: "/etc/xray-bridge/"
xray_bridge_log_dir: "/var/log/xray-bridge"
xray_bridge_user: "xraybridgeuser"
xray_bridge_group: "xraybridgeuser"
xray_bridge_bin_dir: "/usr/local/bin"

# ── Bridge inbound (accepting client connections) ─────────────────────────────
# Listens on localhost — nginx stream SNI routing on :443 forwards here.
# Relay role must set relay_bridge_enabled=true and relay_bridge_sni to match.
xray_bridge_port: 5443
xray_bridge_listen: "127.0.0.1"
xray_bridge_tag_in: "vless-bridge-in"

# Reality dest for bridge inbound — must be TLS 1.3 + H2, different from EU Reality dests.
# Clients connect using this domain as SNI.
xray_bridge_reality_dest: "www.wikipedia.org:443"
xray_bridge_reality_server_names:
  - "www.wikipedia.org"

# Vision flow for all bridge clients
xray_bridge_vless_default_flow: "xtls-rprx-vision"

# Optional Vision testseed (same format as xray_testseed)
# xray_bridge_testseed: [900, 500, 900, 256]

# Optional Vision testpre — pre-connection timing obfuscation (uint32, 0 = disabled)
# xray_bridge_testpre: 0

# ── Outbound to EU Xray (chain link) ─────────────────────────────────────────
# RU Xray connects to EU Xray's XHTTP inbound via XHTTP packet-up mode.
# EU nginx routes this SNI to EU Xray's XHTTP port.
xray_bridge_tag_out: "chain-out-eu"

# EU Xray's XHTTP Reality destination SNI (must match nginx_frontend_stream_v2_xhttp_sni on EU)
xray_bridge_eu_xhttp_sni: "addons.mozilla.org"

# XHTTP path (must match xray_v2_xhttp.xhttpSettings.path on EU)
xray_bridge_eu_xhttp_path: "/api/v4/sync"

# Mode: packet-up preserves packet boundaries through the chain (better for mixed traffic)
xray_bridge_eu_xhttp_mode: "packet-up"

# Fingerprint for uTLS (impersonates Chrome TLS fingerprint toward EU)
xray_bridge_eu_fingerprint: "chrome"

# EU server port (nginx frontend port — always 443 via SNI relay)
xray_bridge_eu_port: 443

# EU Reality public key and short ID — from EU xray_reality in secrets.yml
# Must be set in xray_bridge secrets:
#   xray_bridge_eu_reality_public_key: "PublicKeyHere"
#   xray_bridge_eu_reality_short_id: "shortIdHere"
#   xray_bridge_eu_host: "1.2.3.4"    # EU VPS IP (direct, bypasses RU relay)
#   xray_bridge_eu_user_id: "uuid"    # UUID of bridge user registered on EU Xray

# ── Split routing ─────────────────────────────────────────────────────────────
# Domains and IPs that should bypass the chain and go direct from RU.
# Note: domain:X matches X itself AND all subdomains.
# domain:ru/su/рф covers all .ru/.su/.рф TLD — no need to list yandex.ru, vk.ru, etc.
xray_bridge_direct_domains:
  # Russian TLDs — covers everything under .ru/.su/.рф
  - "domain:ru"
  - "domain:su"
  - "domain:рф"
  # Government (belt-and-suspenders alongside domain:ru + geosite:category-gov-ru)
  - "geosite:category-gov-ru"
  # VK ecosystem — non-.ru TLDs
  - "domain:vk.com"               # VK social network
  - "domain:userapi.com"          # VK media CDN (sun0…sun99.userapi.com)
  - "domain:vk-cdn.net"           # VK static CDN
  # OK.ru ecosystem — non-.ru CDN
  - "domain:mycdn.me"             # Odnoklassniki CDN
  # Yandex ecosystem — non-.ru TLDs
  - "domain:yandex.net"           # Yandex API/CDN
  - "domain:yandex.com"           # Yandex international
  - "domain:yastatic.net"         # Yandex static assets CDN
  # Mail.ru ecosystem — non-.ru
  - "domain:mailru.com"           # Mail.ru CDN/API
  # Avito — non-.ru image CDN
  - "domain:avito.st"             # Avito image CDN (00-99.img.avito.st)
  # 2GIS — non-.ru international
  - "domain:2gis.com"             # 2GIS maps international
  # Wildberries — non-.ru marketplace + CDN
  - "domain:wildberries.com"      # Wildberries international domain
  - "domain:wbcdn.net"            # Wildberries CDN
  # Ozon — non-.ru CDN (Ozon blocks login when VPN detected)
  - "domain:ozonusercontent.com"  # Ozon image/media CDN
  - "domain:ozon.com"             # Ozon international
  # QIWI — non-.ru payment system
  - "domain:qiwi.com"             # QIWI wallet
  - "domain:qiwi.net"             # QIWI CDN
  # Sberbank — non-.ru international domains
  - "domain:sberbank.com"         # Sber international
  - "domain:sbrf.ru"              # Sber legacy (already in domain:ru but explicit)
  # Tinkoff / T-Bank — non-.ru (TCS Group listed abroad)
  - "domain:tinkoff.com"          # Tinkoff international
  # HeadHunter — non-.ru international
  - "domain:hh.com"               # HH.com international
  # CDEK — non-.ru delivery service
  - "domain:cdek.com"             # CDEK international
  # Kaspersky / Dr.Web — security software update servers
  - "domain:kaspersky.com"        # Kaspersky update/activation
  - "domain:kaspersky-labs.com"   # Kaspersky labs CDN
  - "domain:drweb.com"            # Dr.Web update servers
  # RuStore — Russian app store non-.ru assets
  - "domain:rustore.ru"           # RuStore (covered by domain:ru but explicit)
  # MTS — non-.ru CDN
  - "domain:mts.com"              # MTS international
  # Megafon — non-.ru
  - "domain:megafon.com"          # Megafon international

xray_bridge_direct_ips:
  - "geoip:ru"
  - "geoip:private"

# Ads/trackers to block outright
xray_bridge_blocked_domains:
  - "geosite:category-ads-all"

# domainStrategy for routing: IPIfNonMatch resolves unmatched domains to IP for geoip rules
xray_bridge_domain_strategy: "IPIfNonMatch"

# ── Transparent inbounds (EU SNIs routed to RU bridge) ───────────────────────
# When enabled, xray-bridge accepts all EU VPN connections using EU Reality keys.
# Clients use their existing EU configs unchanged — RU nginx routes them here.
# Requires EU xray/defaults/main.yml + xray/defaults/secrets.yml loaded in playbook.
xray_bridge_transparent_enabled: false

# Ports for each transparent inbound (RU nginx routes each EU SNI to a distinct port)
xray_bridge_transparent_reality_port: 5444
xray_bridge_transparent_xhttp_port: 5445
xray_bridge_transparent_reality_v2_port: 5446
xray_bridge_transparent_xhttp_v2_port: 5447

# Tags for transparent inbounds (used in routing rules → chain-out-eu)
xray_bridge_transparent_reality_tag: "vless-reality-transparent"
xray_bridge_transparent_xhttp_tag: "vless-xhttp-transparent"
xray_bridge_transparent_reality_v2_tag: "vless-reality-v2-transparent"
xray_bridge_transparent_xhttp_v2_tag: "vless-xhttp-v2-transparent"

# ── Stats API ─────────────────────────────────────────────────────────────────
# Enables StatsService gRPC API so xray-stats-exporter can scrape per-user traffic.
# Port must not conflict with EU Xray API (10085).
xray_bridge_api_enabled: true
xray_bridge_api_address: "127.0.0.1"
xray_bridge_api_port: 10086
xray_bridge_api_tag: "bridge-api"
xray_bridge_api_services:
  - "HandlerService"
  - "StatsService"

# ── DNS ──────────────────────────────────────────────────────────────────────
# Plain TCP DNS for bridge's own outbound lookups. No DoH — DoH requests would
# route through the chain and cause EOF failures.
#
# Yandex DNS (77.88.8.8) is the primary server — resolves .ru domains to Russian
# IPs reliably, ensuring geoip:ru routing fires on split-routing direct rules.
# 8.8.8.8 / 1.1.1.1 as fallback for domains not in Russian DNS.
xray_bridge_dns_servers:
  - "tcp+local://77.88.8.8"      # Yandex DNS — optimal for .ru resolution
  - "tcp+local://77.88.8.1"      # Yandex DNS secondary
  - "tcp+local://8.8.8.8"        # Google DNS fallback
  - "tcp+local://1.1.1.1"        # Cloudflare DNS fallback
xray_bridge_dns_query_strategy: "UseIPv4"

# ── Logging ───────────────────────────────────────────────────────────────────
xray_bridge_log_level: "warning"

# ── Install ───────────────────────────────────────────────────────────────────
xray_github_repo: "XTLS/Xray-core"   # shared with xray role

