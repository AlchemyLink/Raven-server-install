---
- name: Xray Bridge | Deploy api config
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ xray_bridge_config_dir }}config.d/{{ item | basename | regex_replace('\\.j2$', '') }}"
    owner: "{{ xray_bridge_user }}"
    group: "{{ xray_bridge_group }}"
    mode: "0644"
  loop: "{{ query('fileglob', role_path + '/templates/conf/api/*.j2') }}"
  notify:
    - Validate xray-bridge
    - Restart xray-bridge

- name: Xray Bridge | Check if ufw is available
  ansible.builtin.stat:
    path: /usr/sbin/ufw
  register: _ufw_bin

- name: Xray Bridge | Allow gRPC API from WireGuard subnet
  community.general.ufw:
    rule: allow
    src: "{{ wg_network | default('10.10.0.0/24') }}"
    port: "{{ xray_bridge_api_port | string }}"
    proto: tcp
    comment: "xray-bridge gRPC API via WireGuard"
  when: xray_bridge_api_enabled | default(false) and _ufw_bin.stat.exists
