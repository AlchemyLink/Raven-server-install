# Переопределения только для рендера в tests/ (пути логов в /tmp).
---
xray_log_config:
  service_rotate_name: logrotate.service
  log_level: "warning"
  log_path: "/tmp/raven-xray-test-logs"
  access_log: "access.log"
  error_log: "error.log"
  logrotate_config: "/etc/logrotate.d/xray"
  dns_log: false

# geosite.dat / geoip.dat нет в CI и у ./tests/run.sh без установки ассетов —
# пустой список блокировок и без правил geosite:/geoip: в direct-RU.
xray_blocked_domains: []
xray_direct_ru_enabled: false

# testseed для тестирования рендера (Vision padding, v25.12.8+)
xray_testseed: [900, 500, 900, 256]

# fragment для тестирования рендера (TLS ClientHello fragmentation)
xray_freedom_fragment:
  packets: "tlshello"
  length: "100-200"
  interval: "10-20"
